# ─────────────────────────────────────────────────────────
# GM Dynasty — GitHub Actions Deploy
# Pushes main branch to gh-pages. Same pattern as SleeperBid.
#
# Setup steps (one-time):
#   1. In your repo: Settings → Pages → Source: gh-pages branch
#   2. (Optional) Settings → Pages → Custom domain
#   3. Push to main to trigger first deploy
# ─────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./
          exclude_assets: |
            .github
            .gitignore
            README.md
            firebase/schema.js
