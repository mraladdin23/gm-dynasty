<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tournaments — Dynasty Locker Room</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
  <link rel="stylesheet" href="../css/base.css?v=19" />
  <link rel="stylesheet" href="../css/locker.css?v=21" />
  <link rel="stylesheet" href="../css/tournament.css?v=7" />
  <style>
    /* ── Public tournament page overrides ── */
    body { background: var(--color-bg); }

    .pub-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .pub-nav-brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      color: var(--color-text);
    }

    .pub-nav-actions { display: flex; gap: var(--space-2); }

    .pub-main {
      max-width: 900px;
      margin: 0 auto;
      padding: var(--space-6) var(--space-4) 120px;
    }

    /* ── Loading ── */
    #pub-loading {
      text-align: center;
      padding: var(--space-10) var(--space-4);
      color: var(--color-text-dim);
    }

    /* ── Sign-up banner ── */
    .pub-signup-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, var(--color-primary, #6366f1), #8b5cf6);
      color: #fff;
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
      z-index: 200;
      box-shadow: 0 -4px 24px rgba(0,0,0,.3);
    }

    .pub-signup-banner-text {
      flex: 1;
      min-width: 0;
    }

    .pub-signup-banner-title {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 2px;
    }

    .pub-signup-banner-sub {
      font-size: .8rem;
      opacity: .85;
    }

    .pub-signup-banner-btn {
      background: #fff;
      color: var(--color-primary, #6366f1);
      border: none;
      border-radius: var(--radius-lg, 8px);
      padding: var(--space-2) var(--space-4);
      font-weight: 700;
      font-size: .88rem;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .pub-signup-banner-dismiss {
      background: transparent;
      border: none;
      color: rgba(255,255,255,.7);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 var(--space-1);
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      /* ── Tournament list rows: 4 stacked lines ──────────── */
      .trn-row {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
        padding: 10px var(--space-3);
      }
      .trn-row-main  { width: 100%; }
      .trn-row-line1 { margin-bottom: 3px; }
      .trn-row-name  { font-size: .88rem; }
      .trn-row-line2 {
        white-space: normal;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 4px;
      }
      .trn-row-line3 { flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
      .trn-row-right {
        width: 100%;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--color-border);
        padding-top: 6px;
      }
      .trn-row-actions { width: auto; flex-shrink: 0; }
      .trn-filter-row  { flex-wrap: wrap; gap: 4px; }
      .trn-filter-select { flex: 1 1 130px; font-size: .76rem; }
    }

    @media (max-width: 500px) {
      .pub-nav  { padding: var(--space-3); }
      .pub-main { padding: var(--space-4) var(--space-3) 120px; }
      .pub-signup-banner { padding: var(--space-3); }
      /* Tighten tournament detail on very small screens */
      .trn-detail-container { padding: var(--space-2) var(--space-3); font-size: .86rem; }
      .trn-section-card     { padding: var(--space-2) var(--space-3); }
      .trn-info-name        { font-size: 1.1rem; }
      .trn-info-tagline     { font-size: .82rem; }
      .trn-tab-select       { font-size: .82rem; }
    }
  </style>
</head>
<body>

  <!-- ── Nav ── -->
  <nav class="pub-nav">
    <a href="../" class="pub-nav-brand">
      <span>🏆</span>
      <span>Dynasty Locker Room</span>
    </a>
    <div class="pub-nav-actions">
      <a href="mailto:dynastylockerroom.support@gmail.com" class="btn-secondary btn-sm" style="text-decoration:none">✉️ Contact</a>
      <a href="../" class="btn-secondary btn-sm" style="text-decoration:none">Sign In</a>
      <a href="../?register=1" class="btn-primary btn-sm" id="pub-nav-signup" style="text-decoration:none">Sign Up Free</a>
    </div>
  </nav>

  <!-- ── Main content ── -->
  <main class="pub-main">
    <div id="pub-loading">
      <div class="spinner" style="margin:0 auto var(--space-3)"></div>
      Loading tournaments…
    </div>
    <div id="pub-content" style="display:none"></div>
  </main>

  <!-- ── Sign-up banner ── -->
  <div class="pub-signup-banner" id="pub-signup-banner">
    <div class="pub-signup-banner-text">
      <div class="pub-signup-banner-title">🏈 Want to track your fantasy leagues?</div>
      <div class="pub-signup-banner-sub">Sign up for Dynasty Locker Room — free forever. Link your Sleeper, MFL, and Yahoo leagues.</div>
    </div>
    <a href="../?register=1" class="pub-signup-banner-btn">Sign Up Free →</a>
    <button class="pub-signup-banner-dismiss" id="pub-banner-dismiss" title="Dismiss">✕</button>
  </div>

  <!-- ── Firebase SDK ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="../firebase/config.js"></script>

  <script>
    // ── Public tournaments page ─────────────────────────────
    // Reads from gmd/publicTournaments/{tid} — no auth required.
    // Firebase rules: "publicTournaments": { ".read": true }

    const STATUS_LABELS = {
      draft:             "Draft",
      registration_open: "Registration Open",
      active:            "In Season",
      playoffs:          "Playoffs",
      completed:         "Completed"
    };
    const STATUS_ICONS = {
      draft:             "📝",
      registration_open: "📬",
      active:            "🏈",
      playoffs:          "🏆",
      completed:         "✅"
    };
    const TYPE_BADGE_PUB = {
      points_rounds: { icon: "📈", label: "Points Rounds", cls: "trn-type-points"  },
      h2h_bracket:   { icon: "🥊", label: "H2H Bracket",   cls: "trn-type-h2h"     },
      custom_rounds: { icon: "⚙️", label: "Custom Rounds", cls: "trn-type-custom"  },
      worldcup:      { icon: "🌍", label: "World Cup",     cls: "trn-type-wc"      },
      total_points:  { icon: "🎯", label: "Total Points",  cls: "trn-type-total"   },
    };

    // ── Check if a specific tournament was requested ────────
    const urlParams = new URLSearchParams(window.location.search);
    const requestedTid = urlParams.get("t");

    // ── Dismiss banner ──────────────────────────────────────
    const bannerDismissed = localStorage.getItem("dlr_pub_banner_dismissed");
    const banner = document.getElementById("pub-signup-banner");
    if (bannerDismissed) banner.style.display = "none";
    document.getElementById("pub-banner-dismiss")?.addEventListener("click", () => {
      banner.style.display = "none";
      localStorage.setItem("dlr_pub_banner_dismissed", "1");
    });

    // ── Load and render ─────────────────────────────────────
    const _pubDb   = firebase.database();
    const pubRef  = () => _pubDb.ref("gmd/publicTournaments");
    const tRef    = (tid) => _pubDb.ref("gmd/publicTournaments/" + tid);

    function esc(s) {
      return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    async function init() {
      try {
        if (requestedTid) {
          await loadTournament(requestedTid);
        } else {
          await loadDirectory();
        }
      } catch(err) {
        showError("Failed to load tournaments: " + err.message);
      }
    }

    // ── Directory ───────────────────────────────────────────
    async function loadDirectory() {
      const snap = await pubRef().once("value");
      const all  = snap.val() || {};
      const entries = Object.entries(all)
        .filter(([, t]) => {
          if (!t) return false;
          // Always show non-draft tournaments
          if (t.status !== "draft") return true;
          // Show draft tournaments only if they have prior standings data
          return t.standingsCache && Object.keys(t.standingsCache).length > 0;
        })
        .sort((a, b) => (a[1].name || "").localeCompare(b[1].name || ""));

      const loading = document.getElementById("pub-loading");
      const content = document.getElementById("pub-content");
      loading.style.display = "none";
      content.style.display = "";

      if (!entries.length) {
        content.innerHTML = `
          <div style="text-align:center;padding:80px 16px;color:var(--color-text-dim)">
            <div style="font-size:2.5rem;margin-bottom:16px">🏆</div>
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:8px">No public tournaments yet</div>
            <div style="font-size:.88rem">Check back soon.</div>
          </div>`;
        return;
      }

      // Build unique type and admin values for filter dropdowns
      const pubTypes   = [...new Set(entries.map(([,t]) => t.playoffMode || "total_points"))];
      const pubAdmins  = [...new Set(entries.map(([,t]) => t.createdBy).filter(Boolean))].sort();

      const TYPE_LABELS_PUB = {
        all:           "All Types",
        points_rounds: "📈 Points Rounds",
        h2h_bracket:   "🥊 H2H Bracket",
        custom_rounds: "⚙️ Custom Rounds",
        worldcup:      "🌍 World Cup",
        total_points:  "🎯 Total Points",
      };

      content.innerHTML = `
        <div style="margin-bottom:var(--space-4)">
          <h1 style="font-size:1.5rem;font-weight:800;margin:0 0 var(--space-3)">🏆 Tournaments</h1>
          <div class="trn-filter-row">
            <select class="trn-filter-select" id="pub-type-filter">
              <option value="all">All Types</option>
              ${pubTypes.map(t => `<option value="${t}">${TYPE_LABELS_PUB[t] || t}</option>`).join("")}
            </select>
            <select class="trn-filter-select" id="pub-admin-filter">
              <option value="all">All Admins</option>
              ${pubAdmins.map(a => `<option value="${esc(a)}">${esc(a)}</option>`).join("")}
            </select>
          </div>
        </div>
        <div class="trn-list" id="pub-cards">
          ${entries.map(([tid, t]) => renderCard(tid, t)).join("")}
        </div>`;

      // Filter wiring
      function applyPubFilters() {
        const tf = document.getElementById("pub-type-filter")?.value  || "all";
        const af = document.getElementById("pub-admin-filter")?.value || "all";
        let filtered = entries;
        if (tf !== "all") filtered = filtered.filter(([,t]) => (t.playoffMode || "total_points") === tf);
        if (af !== "all") filtered = filtered.filter(([,t]) => t.createdBy === af);
        document.getElementById("pub-cards").innerHTML =
          filtered.length ? filtered.map(([tid, t]) => renderCard(tid, t)).join("") :
          `<div style="padding:40px;text-align:center;color:var(--color-text-dim)">No tournaments match the current filters.</div>`;
        document.querySelectorAll("[data-pub-open]").forEach(btn => {
          btn.addEventListener("click", () => {
            window.history.pushState({}, "", "?t=" + btn.dataset.pubOpen);
            loadTournament(btn.dataset.pubOpen);
          });
        });
      }
      document.getElementById("pub-type-filter")?.addEventListener("change", applyPubFilters);
      document.getElementById("pub-admin-filter")?.addEventListener("change", applyPubFilters);

      // Wire initial view buttons
      document.querySelectorAll("[data-pub-open]").forEach(btn => {
        btn.addEventListener("click", () => {
          const tid = btn.dataset.pubOpen;
          window.history.pushState({}, "", "?t=" + tid);
          loadTournament(tid);
        });
      });
    }

    function renderCard(tid, t) {
      const status     = t.status || "draft";
      const isDraft    = status === "draft";
      const hasHistory = t.standingsCache && Object.keys(t.standingsCache).length > 0;
      const years      = isDraft && hasHistory
        ? [...new Set(Object.values(t.standingsCache).map(lc => lc.year).filter(Boolean))].sort((a,b) => b-a)
        : [];
      const yearStr   = years.length ? years.join(", ") : null;
      const mode      = t.playoffMode || "total_points";
      const tb        = TYPE_BADGE_PUB[mode] || { icon: "🏆", label: mode, cls: "trn-type-total" };
      const statusBadge = isDraft && hasHistory
        ? `<span class="trn-status-badge" style="background:rgba(99,102,241,.18);color:#a78bfa">📚 History</span>`
        : `<span class="trn-status-badge trn-status-${status}">${STATUS_ICONS[status] || ""} ${STATUS_LABELS[status] || status}</span>`;

      return `
        <div class="trn-row">
          <div class="trn-row-main">
            <div class="trn-row-line1">
              <span class="trn-row-name">${esc(t.name || "Untitled Tournament")}</span>
            </div>
            ${t.tagline ? `<div class="trn-row-line2">${esc(t.tagline)}</div>` : ""}
            <div class="trn-row-line3">
              <span class="trn-type-badge ${tb.cls}">${tb.icon} ${tb.label}</span>
              <span class="trn-row-stat">🏟 ${t.leagueCount || 0}</span>
              ${!isDraft ? `<span class="trn-row-stat">👥 ${t.registrationCount || 0}</span>` : ""}
              ${yearStr ? `<span class="trn-row-stat">📅 ${esc(yearStr)}</span>` : ""}
            </div>
          </div>
          <div class="trn-row-right">
            ${statusBadge}
            <div class="trn-row-actions">
              <button class="btn-secondary btn-sm" data-pub-open="${esc(tid)}">
                ${isDraft && hasHistory ? "History" : "View"}
              </button>
            </div>
          </div>
        </div>`;
    }

    // ── Single tournament view ───────────────────────────────
    let _currentTid      = null;
    let _currentT        = null;
    let _activePubNav    = "overview";  // overview | history | players | chat
    let _activeHistTab   = "standings"; // sub-tab within history
    let _selectedYear    = null;   // null = all years / most recent
    let _adpRefreshTimer = null;   // setInterval handle for ADP auto-refresh
    let _pubBoardUnsub   = null;
    let _pubBoardMsgs    = [];

    // Resolve default year: active season > latest completed > reg-open
    function resolveDefaultYear(t) {
      const scVals = Object.values(t.standingsCache || {});
      const poKeys = Object.keys(t.playoffs || {}).filter(k => /^\d{4}$/.test(k)).map(Number).sort((a,b)=>b-a);
      const scYears = [...new Set(scVals.map(e=>e.year).filter(Boolean).map(Number))].sort((a,b)=>b-a);
      const allYrs = [...new Set([...scYears, ...poKeys])].sort((a,b)=>b-a);
      // Active: has standings + not published
      const active = allYrs.find(y => scVals.some(e=>String(e.year)===String(y)) && !t.playoffs?.[y]?.published);
      if (active) return active;
      const completed = allYrs.find(y => scVals.some(e=>String(e.year)===String(y)));
      if (completed) return completed;
      return allYrs.find(y => t.playoffs?.[y]?.registrationOpen) || allYrs[0] || null;
    }

    async function loadTournament(tid) {
      const loading = document.getElementById("pub-loading");
      const content = document.getElementById("pub-content");
      loading.style.display = "block";
      content.style.display = "none";

      const snap = await tRef(tid).once("value");
      const t    = snap.val();
      if (!t) { showError("Tournament not found."); return; }

      _currentTid   = tid;
      _currentT     = t;
      loading.style.display = "none";
      content.style.display = "";

      const isDraft      = (t.status || "draft") === "draft";
      const hasStandings = t.standingsCache && Object.keys(t.standingsCache).length > 0;
      const hasPlayoffs = !!(t.playoffs && (
        t.playoffs.mode ||
        Object.keys(t.playoffs).some(k => /^\d{4}$/.test(k) && t.playoffs[k]?.mode)
      ));

      // Check registration open
      const regOpenYear = Object.keys(t.playoffs || {})
        .filter(k => /^\d{4}$/.test(k))
        .find(y => t.playoffs[y]?.registrationOpen);
      const anyRegOpen = !!regOpenYear;

      // Build sorted year list
      const scYears = hasStandings
        ? [...new Set(Object.values(t.standingsCache).map(lc => lc.year).filter(Boolean))].sort((a,b)=>b-a)
        : [];
      const poYears = Object.keys(t.playoffs||{}).filter(k=>/^\d{4}$/.test(k)).map(Number).sort((a,b)=>b-a);
      const allYears = [...new Set([...scYears.map(Number), ...poYears])].sort((a,b)=>b-a);

      // Set default year using smart resolution
      const defaultYear = resolveDefaultYear(t);
      if (_selectedYear === null || !allYears.includes(_selectedYear)) {
        _selectedYear = defaultYear;
      }

      // Default nav: if no standings yet default to overview, else history
      if (!["overview","history","players","chat","register"].includes(_activePubNav)) _activePubNav = "overview";
      if (isDraft && hasStandings && _activePubNav === "overview") _activePubNav = "history";

      // Nav pills
      const _pill = (id, label) =>
        `<button class="trn-top-nav-pill${_activePubNav===id?" trn-top-nav-pill--active":""}" data-pubnav="${id}">${label}</button>`;

      const hasHistory  = hasStandings || hasPlayoffs;
      const hasPlayers  = hasStandings;
      // Show Register tab if form exists OR registration is open — always surfaced
      const hasRegForm  = !!(t.registrationForm?.fields?.length || t.registrationForm?.optionalFields?.length || t.registrationForm?.customQuestions?.length || anyRegOpen);

      const navPills = [
        _pill("overview",  "Overview"),
        hasHistory  ? _pill("history",  "Tournament History") : "",
        hasPlayers  ? _pill("players",  "Player Records")     : "",
        hasRegForm  ? _pill("register", anyRegOpen ? "📬 Register" : "Register") : "",
        _pill("chat", "Chat"),
      ].join("");

      const navOpts = [
        `<option value="overview"  ${_activePubNav==="overview" ?"selected":""}>Overview</option>`,
        hasHistory  ? `<option value="history"  ${_activePubNav==="history" ?"selected":""}>Tournament History</option>`  : "",
        hasPlayers  ? `<option value="players"  ${_activePubNav==="players" ?"selected":""}>Player Records</option>`      : "",
        hasRegForm  ? `<option value="register" ${_activePubNav==="register"?"selected":""}>Register</option>`            : "",
        `<option value="chat" ${_activePubNav==="chat"?"selected":""}>Chat</option>`,
      ].join("");

      content.innerHTML = `
        <div style="margin-bottom:var(--space-4)">
          <button id="pub-back-btn" class="btn-ghost btn-sm">← All Tournaments</button>
        </div>

        <div class="trn-detail-title-row" style="margin-bottom:var(--space-3)">
          <div>
            <h1 class="trn-detail-name">${esc(t.name || "Tournament")}</h1>
            ${t.tagline ? `<p class="trn-detail-tagline">${esc(t.tagline)}</p>` : ""}
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
            ${anyRegOpen ? `<button class="btn-primary btn-sm" id="pub-register-pill">📬 Register</button>` : ""}
          </div>
        </div>

        <!-- Top nav: pills desktop, select mobile -->
        <nav class="trn-top-nav">
          <div class="trn-top-nav-pills">${navPills}</div>
          <select class="trn-tab-select trn-top-nav-select" id="pub-top-nav-select">${navOpts}</select>
        </nav>

        <div id="pub-section-body"></div>
      `;

      // Back button
      document.getElementById("pub-back-btn")?.addEventListener("click", () => {
        _clearAdpRefresh();
        window.history.pushState({}, "", window.location.pathname);
        _selectedYear = null;
        _activePubNav = "overview";
        loadDirectory();
      });

      // Register pill in topbar — navigate to Register tab
      document.getElementById("pub-register-pill")?.addEventListener("click", () => {
        _activePubNav = "register";
        document.querySelectorAll(".trn-top-nav-pill[data-pubnav]").forEach(b =>
          b.classList.toggle("trn-top-nav-pill--active", b.dataset.pubnav === "register"));
        const sel = document.getElementById("pub-top-nav-select");
        if (sel) sel.value = "register";
        renderPubSection(allYears);
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      // Top nav pills
      document.querySelectorAll(".trn-top-nav-pill[data-pubnav]").forEach(btn => {
        btn.addEventListener("click", () => {
          _activePubNav = btn.dataset.pubnav;
          document.querySelectorAll(".trn-top-nav-pill[data-pubnav]").forEach(b =>
            b.classList.toggle("trn-top-nav-pill--active", b.dataset.pubnav === _activePubNav));
          const sel = document.getElementById("pub-top-nav-select");
          if (sel) sel.value = _activePubNav;
          renderPubSection(allYears);
        });
      });

      // Top nav select (mobile)
      document.getElementById("pub-top-nav-select")?.addEventListener("change", function() {
        _activePubNav = this.value;
        document.querySelectorAll(".trn-top-nav-pill[data-pubnav]").forEach(b =>
          b.classList.toggle("trn-top-nav-pill--active", b.dataset.pubnav === _activePubNav));
        renderPubSection(allYears);
      });

      // If ADP data exists, may be needed in history
      if (t.adp?.length || Object.keys(t.adpByYear || {}).length) _ensureAdpTabOption();

      renderPubSection(allYears);
    }

    // ── Public section renderer ────────────────────────────
    function renderPubSection(allYears) {
      const body = document.getElementById("pub-section-body");
      if (!body) return;
      body.innerHTML = "";
      switch (_activePubNav) {
        case "overview":  return renderPubOverview(body, allYears);
        case "history":   return renderPubHistory(body, allYears);
        case "players":   return renderPlayersTab(body);
        case "register":  return renderPubRegisterSection(body);
        case "chat":      return renderBoardTab(body);
        default:          return renderPubOverview(body, allYears);
      }
    }

    // ── Register section ────────────────────────────────────
    function renderPubRegisterSection(body) {
      const t         = _currentT;
      const poYears   = Object.keys(t.playoffs || {}).filter(k => /^\d{4}$/.test(k));
      const regOpenYr = poYears.find(y => t.playoffs[y]?.registrationOpen);

      if (!regOpenYr) {
        // Registration exists but is currently closed
        body.innerHTML = `
          <div class="trn-section-card" style="text-align:center;padding:var(--space-6) var(--space-4)">
            <div style="font-size:2rem;margin-bottom:var(--space-3)">🔒</div>
            <div style="font-size:1rem;font-weight:600;margin-bottom:var(--space-2)">Registration Not Open</div>
            <div style="font-size:.85rem;color:var(--color-text-dim);max-width:320px;margin:0 auto">
              Registration for this tournament is not currently open.
              Check back later or contact the commissioner.
            </div>
            ${t.adminEmail ? `
              <div style="margin-top:var(--space-4)">
                <a href="mailto:${esc(t.adminEmail)}?subject=${encodeURIComponent('[' + (t.name||'Tournament') + '] Registration Question')}"
                   class="btn-secondary btn-sm">✉ Contact Commissioner</a>
              </div>` : ""}
          </div>`;
        return;
      }

      // Registration is open — render the form inline
      renderRegisterTab(body);
    }

    // ── Public Season Summary (shown on Overview) ─────────
    // Lightweight port of _renderTournamentSummary — reads from publicTournaments node.
    function renderPubSeasonSummary(t, year) {
      // Read from seasonConfig (thin config) not playoffs (owned by publish button)
      const cfgData = t.seasonConfig || t.playoffs || {};
      const poYears = Object.keys(cfgData).filter(k => /^\d{4}$/.test(k)).map(Number).sort((a,b)=>b-a);
      const dispYear = year || poYears[0] || null;
      if (!dispYear) return "";
      const po = cfgData[String(dispYear)] || {};
      if (!po.mode) return "";
      const scoring = (t.scoringSettings || {})[String(dispYear)] || {};
      const modeLabels = {
        total_points:"Total Points", points_rounds:"Points Rounds",
        h2h_bracket:"H2H Bracket", custom_rounds:"Custom Rounds",
        worldcup:"World Cup", custom_playoffs:"Custom Playoffs"
      };
      const modeIcons = {
        total_points:"📊", points_rounds:"📈", h2h_bracket:"🥊",
        custom_rounds:"⚙️", worldcup:"🌍", custom_playoffs:"🏆"
      };
      const mode = po.mode || "total_points";
      const sw = po.startWeek, ew = po.endWeek;
      const weeksLine = [(sw?`Wk ${sw}`:""), (ew?`\u2013${ew}`:"")].filter(Boolean).join("") || "";
      const overrideText = t.meta?.summaryOverride?.[String(dispYear)] || null;
      const platforms = Object.keys(scoring).filter(k => !k.startsWith("_"));
      const DISPLAY_FIELDS = [
        {key:"pass_yd",label:"Pass Yds/pt"},{key:"pass_td",label:"Pass TD"},
        {key:"rush_yd",label:"Rush Yds/pt"},{key:"rush_td",label:"Rush TD"},
        {key:"rec",label:"Reception"},{key:"rec_yd",label:"Rec Yds/pt"},
        {key:"rec_td",label:"Rec TD"},{key:"bonus_rec_te",label:"TE Bonus"},
        {key:"fum_lost",label:"Fumble Lost"},{key:"_format",label:"Format"},
      ];
      const scoringTableHtml = platforms.length ? `
        <table class="trn-scoring-table" style="margin-top:var(--space-2)">
          <thead><tr><th>Setting</th><th>Value</th></tr></thead>
          <tbody>
            ${DISPLAY_FIELDS.map(f => {
              const val = scoring[platforms[0]]?.[f.key];
              return val !== undefined ? `<tr><td class="trn-scoring-label">${esc(f.label)}</td><td class="trn-scoring-val">${esc(String(val))}</td></tr>` : "";
            }).filter(Boolean).join("")}
          </tbody>
        </table>` : "";
      const yearPillsHtml = poYears.length > 1 ? `
        <div class="trn-summary-year-bar" style="margin-bottom:var(--space-3)">
          ${poYears.map(y => `<button class="trn-summary-year-pill${y===dispYear?" trn-summary-year-pill--active":""}" data-pub-sum-year="${y}">${y}</button>`).join("")}
        </div>` : "";
      return `
        <div class="trn-section-card trn-summary-card" id="pub-season-summary">
          <div class="trn-section-card-title">📋 Season Summary</div>
          ${yearPillsHtml}
          ${overrideText ? `<div class="trn-summary-override-text">${overrideText.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}</div>`
            : `<div class="trn-summary-po-mode" style="margin-bottom:var(--space-2)">
                <span class="trn-summary-mode-icon">${modeIcons[mode]||"🏆"}</span>
                <span class="trn-summary-mode-label">${modeLabels[mode]||mode}</span>
                ${weeksLine ? `<span class="trn-summary-weeks">${esc(weeksLine)}</span>` : ""}
              </div>`}
          ${scoringTableHtml}
        </div>`;
    }

    // ── Public Overview ────────────────────────────────────
    function renderPubOverview(body, allYears) {
      const t = _currentT;
      const meta = t; // public node is flat
      const rawBio = t.bio || "";
      const linkedBio = rawBio
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/\n/g,"<br>")
        .replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:var(--color-accent)">$1</a>');

      // Social links — support both array and legacy object
      const socialArr = Array.isArray(t.socialLinks) ? t.socialLinks
        : Object.entries(t.socialLinks||{}).filter(([,u])=>u).map(([k,u])=>({label:k.charAt(0).toUpperCase()+k.slice(1),url:u}));
      const donationArr = Array.isArray(t.donationLinks) ? t.donationLinks
        : (t.donationLink ? [{label:"Donate / Entry Fee", url:t.donationLink}] : []);
      const socialIcons = {twitter:"𝕏",discord:"💬",reddit:"🤖",website:"🌐",instagram:"📸",youtube:"▶",facebook:"👥",twitch:"🎮"};
      const socialHtml = socialArr.filter(l=>l.url).map(l=>{
        const icon = socialIcons[(l.label||"").toLowerCase()]||"🔗";
        return `<a href="${esc(l.url)}" target="_blank" rel="noopener" class="trn-social-link">${icon} ${esc(l.label||l.url)}</a>`;
      }).join("");
      const donationHtml = donationArr.filter(l=>l.url).map(l=>
        `<a href="${esc(l.url)}" target="_blank" rel="noopener" class="btn-primary trn-donation-btn">💰 ${esc(l.label||"Donate")}</a>`
      ).join("");

      const rby  = t.rulesByYear || {};
      const latestY = Object.keys(rby).map(Number).sort((a,b)=>b-a)[0]||null;
      const rules = latestY ? rby[latestY] : null;

      const contactBtn = t.adminEmail
        ? `<a href="mailto:${esc(t.adminEmail)}?subject=${encodeURIComponent("[" + (t.name||"Tournament") + "] Question")}"
             class="btn-secondary btn-sm trn-contact-btn">✉ Contact Commissioner</a>`
        : "";

      const distinctYears = [...new Set(Object.values(t.standingsCache||{}).map(lc=>lc.year).filter(Boolean))].length||null;
      const regOpenYear = Object.keys(t.playoffs||{}).filter(k=>/^\d{4}$/.test(k)).find(y=>t.playoffs[y]?.registrationOpen);

      body.innerHTML = `
        ${regOpenYear ? `
          <div class="trn-reg-open-banner">
            📬 Registration open for ${regOpenYear}
            <button class="btn-primary btn-sm" id="pub-ov-register-btn">Register Now</button>
          </div>` : ""}

        <div class="trn-overview-grid" style="margin-top:var(--space-4)">
          <div class="trn-stat-card">
            <div class="trn-stat-value">${distinctYears||t.leagueCount||0}</div>
            <div class="trn-stat-label">${distinctYears?"Seasons":"Leagues"}</div>
          </div>
          <div class="trn-stat-card">
            <div class="trn-stat-value">${t.registrationCount||0}</div>
            <div class="trn-stat-label">Registered</div>
          </div>
          <div class="trn-stat-card">
            <div class="trn-stat-value">${t.leagueCount||0}</div>
            <div class="trn-stat-label">Leagues</div>
          </div>
          <div class="trn-stat-card">
            <div class="trn-stat-value">${t.regType==="invite"?"Invite":"Open"}</div>
            <div class="trn-stat-label">Registration</div>
          </div>
        </div>

        ${rawBio ? `<div class="trn-section-card"><div class="trn-section-card-title">About</div><div class="trn-info-bio">${linkedBio}</div></div>` : ""}

        ${renderPubSeasonSummary(t, _selectedYear)}

        ${rules?.content ? `
          <div class="trn-section-card">
            <div class="trn-section-card-title" style="display:flex;justify-content:space-between;align-items:center">
              <span>Rules</span>
              ${rules.version?`<span style="font-size:.75rem;color:var(--color-text-dim)">v${esc(String(rules.version))}</span>`:""}
            </div>
            <div class="trn-info-bio trn-rules-preview" id="pub-rules-preview">
              ${rules.content.split("\n").slice(0,4).map(l=>esc(l)).join("<br>")}
              ${rules.content.split("\n").length>4?"<br><em>…</em>":""}
            </div>
            <button class="btn-secondary btn-sm" id="pub-expand-rules-btn" style="margin-top:var(--space-3)">Show Full Rules</button>
          </div>` : ""}

        ${socialHtml||donationHtml||contactBtn ? `
          <div class="trn-section-card">
            <div class="trn-section-card-title">Connect</div>
            ${socialHtml?`<div class="trn-social-links">${socialHtml}</div>`:""}
            ${donationHtml?`<div style="margin-top:var(--space-3)">${donationHtml}</div>`:""}
            ${contactBtn?`<div style="margin-top:var(--space-3)">${contactBtn}</div>`:""}
          </div>` : ""}
      `;

      document.getElementById("pub-ov-register-btn")?.addEventListener("click", () => {
        _activePubNav = "register";
        document.querySelectorAll(".trn-top-nav-pill[data-pubnav]").forEach(b =>
          b.classList.toggle("trn-top-nav-pill--active", b.dataset.pubnav === "register"));
        const sel = document.getElementById("pub-top-nav-select");
        if (sel) sel.value = "register";
        const scY = [...new Set(Object.values(_currentT.standingsCache||{}).map(lc=>lc.year).filter(Boolean).map(Number))];
        const poY = Object.keys(_currentT.playoffs||{}).filter(k=>/^\d{4}$/.test(k)).map(Number);
        renderPubSection([...new Set([...scY,...poY])].sort((a,b)=>b-a));
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      // Wire season summary year pills
      body.querySelectorAll("[data-pub-sum-year]").forEach(btn => {
        btn.addEventListener("click", () => {
          _selectedYear = Number(btn.dataset.pubSumYear);
          const newSummary = renderPubSeasonSummary(_currentT, _selectedYear);
          const el = document.getElementById("pub-season-summary");
          if (el && newSummary) {
            const tmp = document.createElement("div");
            tmp.innerHTML = newSummary;
            el.replaceWith(tmp.firstElementChild);
            body.querySelectorAll("[data-pub-sum-year]").forEach(b =>
              b.classList.toggle("trn-summary-year-pill--active", Number(b.dataset.pubSumYear) === _selectedYear));
          }
        });
      });

      document.getElementById("pub-expand-rules-btn")?.addEventListener("click", function() {
        const el = document.getElementById("pub-rules-preview");
        if (!el) return;
        const exp = el.classList.contains("trn-rules-full");
        if (exp) {
          el.classList.remove("trn-rules-full");
          el.innerHTML = rules.content.split("\n").slice(0,4).map(l=>esc(l)).join("<br>")+"<br><em>…</em>";
          this.textContent = "Show Full Rules";
        } else {
          el.classList.add("trn-rules-full");
          el.innerHTML = rules.content.split("\n").map(l=>esc(l)).join("<br>");
          this.textContent = "Collapse Rules";
        }
      });
    }

    // ── Public History ─────────────────────────────────────
    function renderPubHistory(body, allYears) {
      const t = _currentT;
      const hasPlayoffs = !!(t.playoffs && (
        t.playoffs.mode ||
        Object.keys(t.playoffs).some(k => /^\d{4}$/.test(k) && t.playoffs[k]?.mode)
      ));
      const hasAdp = !!(t.adp?.length || Object.keys(t.adpByYear||{}).length);

      // Check if any year uses decathlon mode
      const hasDecathlon = Object.keys(t.playoffs||{})
        .filter(k => /^\d{4}$/.test(k))
        .some(y => t.playoffs[y]?.mode === "decathlon");

      const histTabs = [
        { id:"standings",   label:"Standings",   show: true },
        { id:"decathlon",   label:"🏅 Combined",  show: hasDecathlon },
        { id:"playoffs",    label:"Playoffs",    show: hasPlayoffs && !hasDecathlon },
        { id:"adp",         label:"ADP",         show: hasAdp },
      ].filter(h => h.show);

      if (!histTabs.find(h => h.id === _activeHistTab)) _activeHistTab = "standings";

      const tabOpts = histTabs.map(h =>
        `<option value="${h.id}" ${_activeHistTab===h.id?"selected":""}>${h.label}</option>`
      ).join("");

      body.innerHTML = `
        ${allYears.length > 1 ? `
          <div class="trn-year-pill-bar">
            ${allYears.map(y=>`<button class="trn-year-pill${y===_selectedYear?" trn-year-pill--active":""}" data-pyr="${y}">${y}</button>`).join("")}
          </div>` : allYears.length===1 ? `<div class="trn-year-single-label">${allYears[0]}</div>` : ""}

        <div class="trn-history-subnav">
          <div class="trn-history-tabs">
            ${histTabs.map(h=>`<button class="trn-history-tab${_activeHistTab===h.id?" trn-history-tab--active":""}" data-phist="${h.id}">${h.label}</button>`).join("")}
          </div>
          <select class="trn-tab-select trn-history-select" id="pub-hist-select">${tabOpts}</select>
        </div>

        <div id="pub-hist-content"></div>
      `;

      // Wire year pills
      body.querySelectorAll(".trn-year-pill[data-pyr]").forEach(btn => {
        btn.addEventListener("click", async () => {
          _selectedYear = Number(btn.dataset.pyr);
          body.querySelectorAll(".trn-year-pill[data-pyr]").forEach(b =>
            b.classList.toggle("trn-year-pill--active", Number(b.dataset.pyr) === _selectedYear));
          // Fetch year ADP if needed
          if (!_currentT.adpByYear?.[_selectedYear]) {
            try {
              const s = await tRef(_currentTid).child(`adpByYear/${_selectedYear}`).once("value");
              const d = s.val();
              if (Array.isArray(d) && d.length) {
                if (!_currentT.adpByYear) _currentT.adpByYear = {};
                _currentT.adpByYear[_selectedYear] = d;
              }
            } catch(e) {}
          }
          renderPubHistContent();
        });
      });

      // Wire history sub-tabs
      body.querySelectorAll(".trn-history-tab[data-phist]").forEach(btn => {
        btn.addEventListener("click", () => {
          _activeHistTab = btn.dataset.phist;
          body.querySelectorAll(".trn-history-tab[data-phist]").forEach(b =>
            b.classList.toggle("trn-history-tab--active", b.dataset.phist === _activeHistTab));
          const sel = document.getElementById("pub-hist-select");
          if (sel) sel.value = _activeHistTab;
          renderPubHistContent();
        });
      });

      document.getElementById("pub-hist-select")?.addEventListener("change", function() {
        _activeHistTab = this.value;
        body.querySelectorAll(".trn-history-tab[data-phist]").forEach(b =>
          b.classList.toggle("trn-history-tab--active", b.dataset.phist === _activeHistTab));
        renderPubHistContent();
      });

      renderPubHistContent();
    }

    function renderPubHistContent() {
      const content = document.getElementById("pub-hist-content");
      if (!content) return;
      content.innerHTML = "";
      switch (_activeHistTab) {
        case "standings":  return renderStandingsTab(content);
        case "decathlon":  return renderDecathlonTab(content);
        case "playoffs":   return renderPlayoffsTab(content);
        case "adp":        return renderAdpTab(content);
        default:           return renderStandingsTab(content);
      }
    }

    // ── Public Decathlon tab ───────────────────────────────────────────────────
    // Reads from publicTournaments standingsCache + playoffs/{year}.decathlon config.
    // Mirrors _buildDecathlonLeaderboard from tournament.js — no Firebase reads needed.
    function renderDecathlonTab(body) {
      const t    = _currentT;
      const year = _selectedYear || new Date().getFullYear();
      const po   = (t.playoffs || {})[year] || {};
      const dec  = po.decathlon || {};
      const method      = dec.scoringMethod || "combined_pf";
      const finishBasis = dec.finishBasis   || "record"; // record | pf | playoffs
      const identityKey = dec.identityKey   || "sleeperUsername";
      const ptsTable    = Array.isArray(dec.pointsTable) ? dec.pointsTable : [10,8,6,5,4,3,2,1];

      // Build participant display name map
      const dispMap = {};
      Object.values(t.participantMap || {}).forEach(p => {
        if (p.displayName) dispMap[(p.sleeperUsername||"").toLowerCase()] = p.displayName;
      });

      // Collect leagues from standingsCache for this year
      const leagueMap = {};
      Object.entries(t.standingsCache || {}).forEach(([ck, lc]) => {
        if (String(lc.year) !== String(year)) return;
        const lgName = lc.leagueName || ck;
        const lgId   = String(lc.leagueId || lc.league_id || ck);
        if (!leagueMap[lgId]) leagueMap[lgId] = { leagueName: lgName, teams: [] };
        (lc.teams||[]).forEach(tm => leagueMap[lgId].teams.push({ ...tm, leagueName: lgName }));
      });

      // Sort each league by finishBasis to determine finish rank
      Object.values(leagueMap).forEach(lg => {
        if (finishBasis === "pf") {
          lg.teams.sort((a,b) => (b.pf||0) - (a.pf||0));
        } else if (finishBasis === "playoffs") {
          lg.teams.sort((a,b) =>
            ((b.wins||0)-(b.losses||0)) - ((a.wins||0)-(a.losses||0)) ||
            (b.wins||0) - (a.wins||0) || (b.pf||0) - (a.pf||0));
        } else {
          lg.teams.sort((a,b) =>
            ((b.wins||0)-(b.losses||0)) - ((a.wins||0)-(a.losses||0)) || (b.pf||0)-(a.pf||0));
        }
        lg.teams.forEach((tm, i) => { tm._rank = i + 1; });
      });

      const _idk = tm => {
        const norm = s => String(s||"").trim().toLowerCase();
        return norm(identityKey==="sleeperUsername" ? (tm.sleeperUsername||tm.teamName)
          : identityKey==="mflEmail"    ? (tm.mflEmail||tm.teamName)
          : identityKey==="yahooLogin"  ? (tm.yahooLogin||tm.teamName)
          : (tm.dlrUsername||tm.sleeperUsername||tm.teamName));
      };

      // Aggregate per player
      const playerMap = {};
      Object.values(leagueMap).forEach(lg => {
        lg.teams.forEach(tm => {
          const idk = _idk(tm);
          if (!idk) return;
          if (!playerMap[idk]) {
            const dn = dispMap[idk] || dispMap[(tm.sleeperUsername||"").toLowerCase()] || tm.teamName || idk;
            playerMap[idk] = { idk, displayName: dn, leagues:[], totalPF:0, totalPoints:0 };
          }
          const p   = playerMap[idk];
          const pts = method === "finish_points" ? (ptsTable[tm._rank-1]??0) : 0;
          p.leagues.push({ leagueName:lg.leagueName, rank:tm._rank, wins:tm.wins||0, losses:tm.losses||0, pf:tm.pf||0, points:pts });
          p.totalPF     += tm.pf||0;
          p.totalPoints += pts;
        });
      });

      const sorted = Object.values(playerMap).sort((a,b) =>
        method==="finish_points" ? b.totalPoints-a.totalPoints||b.totalPF-a.totalPF : b.totalPF-a.totalPF
      );
      sorted.forEach((p,i) => { p.rank=i+1; p.divisionsWon=p.leagues.filter(l=>l.rank===1).map(l=>l.leagueName); });

      if (!sorted.length) {
        body.innerHTML = `<div class="trn-po-empty">No standings data yet for ${year}.</div>`;
        return;
      }

      const medal = i => i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
      const valueFn = p => method==="finish_points" ? `${p.totalPoints} pts` : p.totalPF.toFixed(2);
      const ordinal = n => n+(["th","st","nd","rd"][(n>3&&n<21)?0:(n%10<4?n%10:0)]||"th");
      const basisLabel = finishBasis==="pf"       ? "by Points Scored"
                       : finishBasis==="playoffs" ? "by League Playoffs (H2H tiebreak)"
                       :                             "by H2H Record";
      const methodNote = method==="finish_points"
        ? `Finish Points (${basisLabel}) — ${ptsTable.slice(0,4).map((v,i)=>ordinal(i+1)+"="+v).join(", ")}…`
        : "Combined PF across all leagues";

      const podium = sorted.slice(0,3).map((p,i) => `
        <div class="trn-dec-podium-card trn-dec-podium-${i+1}">
          <div class="trn-dec-podium-medal">${medal(i)}</div>
          <div class="trn-dec-podium-name">${esc(p.displayName)}</div>
          <div class="trn-dec-podium-value">${valueFn(p)}</div>
          <div class="trn-dec-podium-leagues">${p.leagues.length} league${p.leagues.length!==1?"s":""}</div>
          ${p.divisionsWon.length?`<div class="trn-dec-podium-divwins">🏆 ${p.divisionsWon.map(l=>esc(l)).join(", ")}</div>`:""}
        </div>`).join("");

      const rows = sorted.map((p,i) => {
        const breakdown = p.leagues.map(l=>`${l.leagueName}: #${l.rank} (${method==="finish_points"?l.points+"pts":l.pf.toFixed(1)})`).join(" | ");
        return `<tr class="${i===0?"trn-po-row--champion":i===1?"trn-dec-row--silver":i===2?"trn-dec-row--bronze":""}" title="${esc(breakdown)}">
          <td class="trn-po-rank">${medal(i)||i+1}</td>
          <td class="trn-po-team-name">
            <div>${esc(p.displayName)}</div>
            ${p.divisionsWon.length?`<div class="trn-po-team-sub">🏆 ${p.divisionsWon.map(l=>esc(l)).join(", ")}</div>`:""}
          </td>
          <td class="trn-po-num">${p.leagues.length}</td>
          ${method==="finish_points"
            ? `<td class="trn-po-num trn-po-pf">${p.totalPoints}</td><td class="trn-po-num" style="font-size:.78rem;color:var(--color-text-dim)">${p.totalPF.toFixed(1)}</td>`
            : `<td class="trn-po-num trn-po-pf">${p.totalPF.toFixed(2)}</td><td class="trn-po-num" style="font-size:.78rem;color:var(--color-text-dim)">${p.leagues.map(l=>`#${l.rank}`).join(", ")}</td>`}
        </tr>`;
      }).join("");

      body.innerHTML = `
        <div class="trn-dec-podium-row">${podium}</div>
        <div class="trn-po-tp-note">${esc(methodNote)}</div>
        <div class="trn-po-table-wrap">
          <table class="trn-po-table">
            <thead><tr>
              <th>#</th><th>Player</th><th class="trn-po-th-num">Leagues</th>
              ${method==="finish_points"
                ? `<th class="trn-po-th-num">Points</th><th class="trn-po-th-num">PF</th>`
                : `<th class="trn-po-th-num">Combined PF</th><th class="trn-po-th-num">Ranks</th>`}
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <p style="font-size:.72rem;color:var(--color-text-dim);margin-top:var(--space-2)">Hover/tap a row for per-league breakdown.</p>`;
    }

    // Legacy alias so existing renderTab calls still work when called from other places
    async function renderTab(tab) {

      else if (tab === "board")   { _activePubNav="chat"; }

    // ── Info tab (legacy — kept for internal use) ──────────
    function renderInfoTab(body) {

          <div class="trn-stat-card"><div class="trn-stat-value">${t.registrationCount || 0}</div><div class="trn-stat-label">Registered</div></div>
          <div class="trn-stat-card"><div class="trn-stat-value">${t.regType === "invite" ? "Invite" : "Open"}</div><div class="trn-stat-label">Registration</div></div>
        </div>
        ${rawBio ? `
          <div class="trn-section-card">
            <div class="trn-section-card-title">About This Tournament</div>
            <div class="trn-info-bio">${linkedBio}</div>

        ${t.donationLink ? `
          <div class="trn-section-card trn-info-donation">
            <div class="trn-section-card-title">Support the Tournament</div>
            <a href="${esc(t.donationLink)}" target="_blank" rel="noopener" class="btn-primary trn-donation-btn">💰 Donate / Entry Fee</a>
          </div>` : ""}
        ${socialHtml ? `
          <div class="trn-section-card">
            <div class="trn-section-card-title">Follow Us</div>
            <div class="trn-social-links">${socialHtml}</div>

        ${rulesPreview ? `
          <div class="trn-section-card">
            <div class="trn-section-card-title" style="display:flex;justify-content:space-between;align-items:center">
              <span>Rules</span>
              <div style="display:flex;gap:var(--space-2);align-items:center">
                ${_rulesYear ? `<span style="font-size:.75rem;color:var(--color-text-dim)">${_rulesYear}</span>` : ""}
                ${rules?.version ? `<span style="font-size:.75rem;color:var(--color-text-dim)">v${esc(String(rules.version))}</span>` : ""}
              </div>
            </div>
            <div class="trn-info-bio trn-rules-preview">${rulesPreview}</div>
            <button class="btn-secondary btn-sm" id="pub-view-rules-btn" style="margin-top:var(--space-3)">View Full Rules</button>
          </div>` : ""}`;

      document.getElementById("pub-view-rules-btn")?.addEventListener("click", () => {
        _activeTab = "rules";
        const sel = document.getElementById("pub-tab-select");
        if (sel) sel.value = "rules";
        renderTab("rules");
      });

    // ── ADP tab (public site) ────────────────────────────────────────────────
    // Reads from _currentT.adp (flat) or _currentT.adpByYear[_selectedYear].
    // Uses the same POS_COLOR and page variables declared above.
    function renderAdpTab(body) {
      const t   = _currentT;
      const adp = (t.adpByYear && _selectedYear && t.adpByYear[_selectedYear])
        ? t.adpByYear[_selectedYear]
        : (t.adp || []);

      if (!adp.length) {
        body.innerHTML = `
          <div class="trn-empty">
            <div class="trn-empty-icon">📊</div>
            <div class="trn-empty-title">No ADP data for ${_selectedYear || "this year"}</div>
            <div class="trn-empty-sub">ADP is published by the tournament admin after the draft.</div>
          </div>`;
        return;
      }

      const isMobile  = window.innerWidth <= 640;
      const PAGE_SIZE = ADP_PAGE_SIZE;

      const positions = ["all", ...new Set(adp.map(p => p.position).filter(Boolean))];
      const posOpts   = positions.map(p =>
        `<option value="${esc(p)}" ${_adpPos === p ? "selected" : ""}>${p === "all" ? "All Positions" : esc(p)}</option>`
      ).join("");

      const filtered = _adpPos === "all" ? adp : adp.filter(p => p.position === _adpPos);
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const page       = Math.max(1, Math.min(_adpPage, totalPages));
      const pageSlice  = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

      const COL = isMobile ? "28px 1fr 44px 34px 34px" : "32px 1fr 36px 52px 40px 40px 76px";
      const headerCols = isMobile
        ? `<span>#</span><span>Player</span><span style="text-align:right">ADP</span><span style="text-align:right">Min</span><span style="text-align:right">Max</span>`
        : `<span>#</span><span>Player</span><span style="text-align:center">Dft</span><span style="text-align:center">ADP</span><span style="text-align:center">Min</span><span style="text-align:center">Max</span><span style="text-align:center">25–75%</span>`;

      const rows = pageSlice.map((p, i) => {
        const col      = POS_COLOR[p.position] || "#9ca3af";
        const mn       = p.min  != null ? p.min  : "—";
        const mx       = p.max  != null ? p.max  : "—";
        const rangeStr = (p.p25 != null && p.p75 != null) ? `${Math.round(p.p25)}–${Math.round(p.p75)}` : "—";
        const statCols = isMobile
          ? `<span style="text-align:right;font-size:.8rem;font-variant-numeric:tabular-nums">${p.adp.toFixed(1)}</span>
             <span style="text-align:right;font-size:.76rem;font-variant-numeric:tabular-nums;color:var(--color-text-dim)">${mn}</span>
             <span style="text-align:right;font-size:.76rem;font-variant-numeric:tabular-nums;color:var(--color-text-dim)">${mx}</span>`
          : `<span style="text-align:center;font-size:.8rem;font-variant-numeric:tabular-nums">${p.count || "—"}</span>
             <span style="text-align:center;font-size:.8rem;font-variant-numeric:tabular-nums">${p.adp.toFixed(1)}</span>
             <span style="text-align:center;font-size:.8rem;font-variant-numeric:tabular-nums">${mn}</span>
             <span style="text-align:center;font-size:.8rem;font-variant-numeric:tabular-nums">${mx}</span>
             <span style="text-align:center;font-size:.8rem;font-variant-numeric:tabular-nums">${rangeStr}</span>`;
        return `
          <div class="draft-auction-row" style="grid-template-columns:${COL}">
            <span style="font-size:.75rem;color:var(--color-text-dim)">${(page - 1) * PAGE_SIZE + i + 1}</span>
            <div style="display:flex;align-items:center;gap:4px;min-width:0">
              <span class="draft-pos-badge" style="background:${col}22;color:${col};border-color:${col}55;flex-shrink:0;font-size:.65rem;padding:1px 5px;border-radius:4px;border:1px solid">${esc(p.position || "?")}</span>
              <span style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name || "Unknown")}</span>
            </div>
            ${statCols}
          </div>`;
      }).join("");

      const pagination = totalPages > 1 ? `
        <div class="draft-pagination" style="display:flex;align-items:center;justify-content:center;gap:var(--space-3);padding:var(--space-3)">
          <button class="draft-toggle-btn" id="pub-adp-prev" ${page <= 1 ? "disabled" : ""}>‹ Prev</button>
          <span style="font-size:.85rem;color:var(--color-text-dim)">Page ${page} of ${totalPages}</span>
          <button class="draft-toggle-btn" id="pub-adp-next" ${page >= totalPages ? "disabled" : ""}>Next ›</button>
        </div>` : "";

      body.innerHTML = `
        <div style="display:flex;gap:var(--space-2);align-items:center;flex-wrap:wrap;margin-bottom:var(--space-3)">
          <select id="pub-adp-pos" style="padding:var(--space-2) var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface);color:var(--color-text);font-size:.85rem">${posOpts}</select>
          <span style="font-size:.78rem;color:var(--color-text-dim)">${adp.length} players · ${filtered.length} shown${_selectedYear ? " · " + _selectedYear : ""}</span>
        </div>
        <div class="draft-auction-list trn-adp-table">
          <div class="draft-auction-header" style="grid-template-columns:${COL};font-size:.7rem">${headerCols}</div>
          ${rows}
        </div>
        ${pagination}`;

      document.getElementById("pub-adp-pos")?.addEventListener("change", function() {
        _adpPos  = this.value;
        _adpPage = 1;
        renderAdpTab(body);
      });
      document.getElementById("pub-adp-prev")?.addEventListener("click", () => { _adpPage--; renderAdpTab(body); });
      document.getElementById("pub-adp-next")?.addEventListener("click", () => { _adpPage++; renderAdpTab(body); });
    }

    // ── Players tab — career history (public site) ──────────────────────────
    // List view, 25/page, searchable. Sorted: tournament champions first,
    // then years desc, then win% desc. Click row → career modal.
    // Year-agnostic: shows all years regardless of _selectedYear.
    let _pubPhSearch = "";
    let _pubPhPage   = 1;

    function renderPlayersTab(body) {
      const t    = _currentT;
      const cache = t.standingsCache || {};
      const pMap  = t.participantMap || {};
      const _sk   = (s) => String(s || "").trim().toLowerCase().replace(/[.#$\/\[\]]/g, "_");

      // ── Build career data from standingsCache ───────────────
      const careers = {};

      for (const lc of Object.values(cache)) {
        const year     = String(lc.year || "Unknown");
        const lgName   = lc.leagueName || "Unknown League";
        const champion = lc.champion || null;
        const champKey = champion
          ? (_sk(champion.sleeperUsername || "") || _sk(champion.teamName || ""))
          : null;

        for (const tm of (lc.teams || [])) {
          let part = null;
          if (tm.sleeperUsername) part = pMap[_sk(tm.sleeperUsername)];
          if (!part && tm.teamName) part = pMap[_sk(tm.teamName)];

          const displayName = part?.displayName || tm.teamName || "Unknown";
          const careerKey   = _sk(displayName);

          if (!careers[careerKey]) {
            careers[careerKey] = { displayName, gender: part?.gender || "", twitter: part?.twitterHandle || "", seasons: {} };
          }
          if (!careers[careerKey].seasons[year]) careers[careerKey].seasons[year] = [];

          const isChamp = !!(champKey && (
            (tm.sleeperUsername && _sk(tm.sleeperUsername) === champKey) ||
            (tm.teamName        && _sk(tm.teamName)        === champKey)
          ));

          careers[careerKey].seasons[year].push({
            leagueName: lgName, teamName: tm.teamName || displayName,
            wins: tm.wins || 0, losses: tm.losses || 0, ties: tm.ties || 0,
            pf: tm.pf || 0, isChamp, platform: lc.platform || "sleeper"
          });
        }
      }

      // ── Join playoff qualification data from published snapshots ───────────
      // PRIMARY: read finalRankings (authoritative ordered list written at publish time).
      // FALLBACK: read po.standings (pre-finalRankings format — no rank data).
      const poByYear = {};
      const poData = t.playoffs || {};
      for (const [yr, po] of Object.entries(poData)) {
        if (!/^\d{4}$/.test(String(yr))) continue; // skip flat/legacy
        poByYear[String(yr)] = {};

        // Primary: finalRankings
        if (Array.isArray(po.finalRankings) && po.finalRankings.length) {
          po.finalRankings.forEach(entry => {
            [entry.displayName, entry.teamName].filter(Boolean).map(_sk).forEach(k => {
              if (!poByYear[String(yr)][k]) {
                poByYear[String(yr)][k] = {
                  qualified:        !!(entry.qualified),
                  bye:              !!(entry.bye),
                  rank:             entry.finalRank || null,
                  isTournamentChamp: !!(entry.isTChamp),
                  isGroupWinner:    !!(entry.isGroupWinner),
                  groupWins:        entry.groupWins   ?? null,
                  groupLosses:      entry.groupLosses ?? null,
                  groupPF:          entry.groupPF     ?? null,
                };
              }
            });
          });
          continue;
        }

        // Fallback: standings array (no rank available)
        if (!po?.standings) continue;
        po.standings.forEach((tm, idx) => {
          const keys = [tm.displayName, tm.teamName].filter(Boolean).map(_sk);
          const isTournamentChamp = (po.mode === "total_points" && idx === 0) || !!(tm.isChamp);
          keys.forEach(k => {
            poByYear[String(yr)][k] = {
              qualified: !!(tm.qualified),
              bye:       !!(tm.bye),
              rank:      null,
              isTournamentChamp,
              roundsData: po.computedRounds || []
            };
          });
        });
      }

      // ── Aggregate career stats ───────────────────────────────
      const playerList = Object.values(careers).map(c => {
        const yearKeys = Object.keys(c.seasons).sort((a, b) => b - a);
        let totalLeagues = 0, totalWins = 0, totalLosses = 0, totalPF = 0, totalChamps = 0;
        let playoffApps = 0, tournamentChamps = 0, bestRank = null;
        const yearData = {};

        yearKeys.forEach(yr => {
          // Playoff qualification entry — try displayName first, then teamName variants
          const cKey    = _sk(c.displayName);
          const poYr    = poByYear[yr] || {};
          const teamNames = (c.seasons[yr] || []).map(s => _sk(s.teamName)).filter(Boolean);
          const poEntry = poYr[cKey]
            || teamNames.reduce((found, k) => found || poYr[k], null)
            || null;

          // For worldcup years: override W/L/PF with group-stage records BEFORE accumulating
          if (poEntry?.groupWins !== null && poEntry?.groupWins !== undefined) {
            (c.seasons[yr] || []).forEach(season => {
              season.wins   = poEntry.groupWins;
              season.losses = poEntry.groupLosses ?? season.losses;
              season.pf     = poEntry.groupPF     ?? season.pf;
            });
          }

          const bracketComplete = Array.isArray(((t.playoffs||{})[yr]||{}).finalRankings)
            && ((t.playoffs||{})[yr]||{}).finalRankings.some(e => e.isTChamp);

          c.seasons[yr].forEach(s => {
            totalLeagues++;
            totalWins   += s.wins;
            totalLosses += s.losses;
            totalPF     += s.pf;
            if (bracketComplete) {
              if (poEntry?.isGroupWinner) totalChamps++;
              else if (!poEntry?.isGroupWinner && poEntry?.groupWins == null && s.isChamp) totalChamps++;
            }
          });

          yearData[yr]  = poEntry || { qualified: false, bye: false, rank: null, isTournamentChamp: false, isGroupWinner: false };

          if (bracketComplete) {
            if (poEntry?.qualified)          playoffApps++;
            if (poEntry?.isTournamentChamp)  tournamentChamps++;
            if (poEntry?.rank && (!bestRank || poEntry.rank < bestRank)) bestRank = poEntry.rank;
          }
        });

        // Streak: consecutive most-recent seasons qualified
        let streak = 0;
        for (const yr of yearKeys) {
          if (yearData[yr]?.qualified) streak++;
          else break;
        }

        const winPct = (totalWins + totalLosses) > 0
          ? (totalWins / (totalWins + totalLosses) * 100).toFixed(1) : null;

        return { ...c, yearKeys, yearData, totalYears: yearKeys.length, totalLeagues,
          totalWins, totalLosses, totalPF, totalChamps, playoffApps, tournamentChamps,
          bestRank, winPct, streak };
      });

      // ── Sort: tournament champs first, then years desc, then bestRank asc, then win% desc ──────
      playerList.sort((a, b) => {
        if (b.tournamentChamps !== a.tournamentChamps) return b.tournamentChamps - a.tournamentChamps;
        if (b.totalYears !== a.totalYears) return b.totalYears - a.totalYears;
        if (a.bestRank !== b.bestRank) {
          if (a.bestRank === null) return 1;
          if (b.bestRank === null) return -1;
          return a.bestRank - b.bestRank;
        }
        const wa = parseFloat(a.winPct) || 0, wb = parseFloat(b.winPct) || 0;
        return wb - wa;
      });

      if (!playerList.length) {
        body.innerHTML = `
          <div class="trn-empty">
            <div class="trn-empty-icon">👥</div>
            <div class="trn-empty-title">No player history yet</div>
            <div class="trn-empty-sub">Standings have not been synced for this tournament.</div>
          </div>`;
        return;
      }

      const PH_PAGE_SIZE = 25;

      // All years across standings + playoff data, newest first
      const allYearsSet = [...new Set([
        ...Object.values(t.standingsCache || {}).map(lc => lc.year).filter(Boolean).map(String),
        ...Object.keys(poByYear)
      ])].sort((a, b) => String(b).localeCompare(String(a)));
      const hasPoData = Object.keys(poByYear).length > 0;

      // ── Build list rows ──────────────────────────────────────
      const _renderList = (q, pg) => {
        const filtered = q
          ? playerList.filter(p => p.displayName.toLowerCase().includes(q.toLowerCase()))
          : playerList;
        if (!filtered.length) return { html: `<div class="trn-players-empty">No players match "${esc(q)}"</div>`, total: 0, pages: 0 };

        const totalPgs = Math.ceil(filtered.length / PH_PAGE_SIZE);
        const curPg    = Math.max(1, Math.min(pg, totalPgs));
        const slice    = filtered.slice((curPg - 1) * PH_PAGE_SIZE, curPg * PH_PAGE_SIZE);
        const startRank = (curPg - 1) * PH_PAGE_SIZE + 1;

        const pipHeaders = allYearsSet.map(y =>
          `<span style="font-size:.62rem;font-weight:600;display:inline-block;width:14px;text-align:center">${String(y).slice(2)}</span>`
        ).join("");

        const rows = slice.map((p, i) => {
          const rank = startRank + i;
          const genderBadge = p.gender === "Male"
            ? `<span class="trn-gender-m" style="font-size:.65rem">M</span>`
            : p.gender === "Female" ? `<span class="trn-gender-f" style="font-size:.65rem">F</span>` : "";
          // Highlight row: gold for tournament champions, subtle for league champs only
          const isTChamp = p.tournamentChamps > 0;
          const isLChamp = p.totalChamps > 0 && !isTChamp;
          const rowCls   = isTChamp ? "trn-ph-row trn-ph-row--tchamp" : isLChamp ? "trn-ph-row trn-ph-row--lchamp" : "trn-ph-row";
          const champCell = isTChamp
            ? `<span class="trn-ph-champ-badge">🏆 ×${p.tournamentChamps}</span>`
            : p.totalChamps > 0 ? `<span class="trn-ph-champ-badge" style="background:rgba(99,102,241,.15);color:#a78bfa;border-color:rgba(99,102,241,.3)">🥇 ×${p.totalChamps}</span>`
            : `<span style="color:var(--color-text-dim)">—</span>`;
          const poCell = hasPoData
            ? (p.playoffApps > 0
                ? `<span style="color:#4ade80;font-weight:600">${p.playoffApps}</span><span style="color:var(--color-text-dim)">/${p.totalYears}</span>`
                : `<span style="color:var(--color-text-dim)">0/${p.totalYears}</span>`)
            : `<span style="color:var(--color-text-dim)">—</span>`;
          const bestCell = p.bestRank
            ? (p.bestRank === 1
                ? `<span style="color:var(--color-gold,#d4af37);font-weight:700">1 🏆</span>`
                : `<span style="font-weight:600">${p.bestRank}</span>`)
            : `<span style="color:var(--color-text-dim)">—</span>`;
          const yearPips = allYearsSet.map(yr => {
            const e      = p.yearData[String(yr)];
            const inS    = !!(p.seasons[String(yr)]);
            if (!e && !inS) return `<span class="trn-az-yr-pip trn-az-yr-pip--absent" title="${yr}: did not play"></span>`;
            const poYrD  = (t.playoffs || {})[yr] || {};
            const bDone  = Array.isArray(poYrD.finalRankings) && poYrD.finalRankings.some(e2 => e2.isTChamp);
            if (!e || !bDone) {
              return `<span class="trn-az-yr-pip trn-az-yr-pip--absent" title="${yr}: ${inS ? "in progress" : "played, no PO data"}"></span>`;
            }
            const isWCYear = e.groupWins !== null && e.groupWins !== undefined;
            let cls, tip;
            if (e.isTournamentChamp) {
              cls = "trn-az-yr-pip--champ"; tip = `${yr}: 🏆 Tournament Champion`;
            } else if (isWCYear) {
              if (e.isGroupWinner) {
                cls = "trn-az-yr-pip--qual"; tip = `${yr}: ✓ Won Group${e.rank ? " · Finish " + e.rank : ""}`;
              } else {
                cls = "trn-az-yr-pip--elim"; tip = `${yr}: Did not win group${e.rank ? " · Finish " + e.rank : ""}`;
              }
            } else {
              cls = e.qualified ? "trn-az-yr-pip--qual" : "trn-az-yr-pip--elim";
              tip = e.qualified
                ? `${yr}: ✓ Qualified${e.bye ? " (BYE)" : ""}${e.rank ? " · Rank " + e.rank : ""}`
                : `${yr}: Eliminated`;
            }
            return `<span class="trn-az-yr-pip ${cls}" title="${tip}"></span>`;
          }).join("");
          return `
            <tr class="${rowCls}" data-ph-key="${esc(_sk(p.displayName))}" role="button" tabindex="0" style="cursor:pointer">
              <td class="trn-ph-col-rank">${rank}</td>
              <td class="trn-ph-col-name">
                <span style="font-weight:600">${esc(p.displayName)}</span>
                ${genderBadge}
                ${p.streak >= 2 ? `<span class="trn-az-streak-badge">🔥 ${p.streak}</span>` : ""}

                  <th class="trn-ph-col-champ trn-ph-th-tip" style="text-align:center" title="🏆 Tournament Champion · 🥇 League Champion">Titles</th>
                  ${hasPoData ? `<th class="trn-az-pips-cell trn-ph-th-tip" title="Year-by-year playoff history (hover for detail)">${pipHeaders}</th>` : ""}
                </tr></thead>
                <tbody>${rows}</tbody>
                ${pagination}

          total: filtered.length,
          pages: totalPgs,
          cur:   curPg

      };

      // ── Initial render ───────────────────────────────────────
      const _refresh = () => {
        const result = _renderList(_pubPhSearch, _pubPhPage);
        const wrap   = document.getElementById("pub-ph-list-wrap");
        if (wrap) wrap.innerHTML = result.html;

      const initial = _renderList(_pubPhSearch, _pubPhPage);
      body.innerHTML = `

      // ── Events ────────────────────────────────────────────────

        const modalRoot = document.createElement("div");

        modalRoot.className = "trn-ph-modal-backdrop";
        modalRoot.style.display = "flex";
        modalRoot.innerHTML = `
          <div class="trn-ph-modal">
            <div class="trn-ph-modal-header">

            </div>

                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.totalYears}</div><div class="trn-ph-stat-lbl">Season${p.totalYears !== 1 ? "s" : ""}</div></div>
                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.totalWins}–${p.totalLosses}</div><div class="trn-ph-stat-lbl">Career W–L</div></div>
                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.winPct !== null ? p.winPct + "%" : "—"}</div><div class="trn-ph-stat-lbl">Win%</div></div>
                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.playoffApps}/${p.totalYears}</div><div class="trn-ph-stat-lbl">PO Apps</div></div>
                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.bestRank ?? "—"}</div><div class="trn-ph-stat-lbl">Best Rank</div></div>
                <div class="trn-ph-stat"><div class="trn-ph-stat-val">${p.totalPF ? p.totalPF.toFixed(0) : "—"}</div><div class="trn-ph-stat-lbl">Career PF</div></div>
                ${p.tournamentChamps > 0 ? `<div class="trn-ph-stat"><div class="trn-ph-stat-val">🏆×${p.tournamentChamps}</div><div class="trn-ph-stat-lbl">Tourn.</div></div>` : ""}
                ${p.totalChamps > 0 ? `<div class="trn-ph-stat"><div class="trn-ph-stat-val">🥇×${p.totalChamps}</div><div class="trn-ph-stat-lbl">League</div></div>` : ""}
              </div>
              ${yearSections}

        document.body.appendChild(modalRoot);
        document.body.style.overflow = "hidden";
        const _close = () => { modalRoot.remove(); document.body.style.overflow = ""; };
        document.getElementById("pub-ph-close")?.addEventListener("click", _close);
        modalRoot.addEventListener("click", (e) => { if (e.target === modalRoot) _close(); });
      };

      _wirePubPhRows(playerList);
    }

    // ── Rules tab (public) ──────────────────────────────────
    function renderRulesTab(body) {
      const t   = _currentT;
      const rby = t.rulesByYear || {};
      const years = Object.keys(rby).map(Number).sort((a, b) => b - a);

      // Default to the globally selected year if available, else latest
      let selYear = (_selectedYear && rby[_selectedYear])
        ? String(_selectedYear)
        : (years.length ? String(years[0]) : null);

      function renderRulesContent(year) {
        const inner = document.getElementById("pub-rules-content");
        if (!inner) return;
        const rules = rby[year] || null;
        if (!rules?.content) {
          inner.innerHTML = `
            <div class="trn-empty" style="padding:var(--space-4) 0">
              <div class="trn-empty-icon">📋</div>
              <div class="trn-empty-title">No rules for ${year}</div>
              <div class="trn-empty-sub">The commissioner hasn't published rules for this year.</div>
            </div>`;
          return;
        }
        const htmlContent = rules.content
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/\n/g, "<br>")
          .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--color-accent)">$1</a>');
        inner.innerHTML = `
          <div style="display:flex;gap:var(--space-3);align-items:center;margin-bottom:var(--space-3);font-size:.78rem;color:var(--color-text-dim)">
            ${rules.version ? `<span>Version ${esc(String(rules.version))}</span>` : ""}
            ${rules.updatedAt ? `<span>${new Date(rules.updatedAt).toLocaleDateString()}</span>` : ""}
          </div>
          <div class="trn-info-bio trn-rules-full">${htmlContent}</div>`;
      }

      if (!selYear) {
        body.innerHTML = `
          <div class="trn-empty">
            <div class="trn-empty-icon">📋</div>
            <div class="trn-empty-title">No rules posted yet</div>
            <div class="trn-empty-sub">The commissioner hasn't published rules for this tournament.</div>
          </div>`;
        return;
      }

      const yearOptions = years.map(y =>
        `<option value="${y}" ${String(y) === selYear ? "selected" : ""}>${y}</option>`
      ).join("");

      body.innerHTML = `
        <div class="trn-section-card">
          <div class="trn-section-card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-2)">
            <span>Tournament Rules</span>
            ${years.length > 1 ? `
              <div style="display:flex;align-items:center;gap:var(--space-2)">
                <label style="font-size:.8rem;color:var(--color-text-dim)">Year:</label>
                <select id="pub-rules-year" style="font-size:.8rem;padding:2px 6px">${yearOptions}</select>
              </div>` : `<span style="font-size:.78rem;color:var(--color-text-dim)">${selYear}</span>`}
          </div>
          <div id="pub-rules-content"></div>
        </div>`;

      renderRulesContent(selYear);

      document.getElementById("pub-rules-year")?.addEventListener("change", function() {
        selYear = this.value;
        renderRulesContent(selYear);
      });
    }

    // ── Standings tab (read-only, reuses cached data) ───────
    let _stSort = { col: "overallRank", dir: "asc" };
    let _stConf = "";  // persists conference filter across sort re-renders

    function renderStandingsTab(body) {
      const t       = _currentT;
      const cache   = t.standingsCache || {};

      // ── World Cup: group dropdown selector ──────────────────────────────────
      const allPoYears = Object.keys(t.playoffs || {}).filter(k => /^\d{4}$/.test(k)).sort((a,b) => b-a);
      // Respect the global year selector
      const poYear = allPoYears.find(y => String(y) === String(_selectedYear)) || allPoYears[0] || null;
      const po     = poYear ? (t.playoffs[poYear] || {}) : {};
      if (po.mode === "worldcup") {
        const wcGroups  = po.worldcupGroups  || [];
        const wcSched   = po.worldcupSchedule || {};
        const wcRegWks  = po.worldcupRegWeeks || 6;
        const startWk   = po.startWeek || null;
        const wcAdv     = po.worldcupAdvanceCount ?? 2;
        const _sk       = (s) => String(s||"").trim().toLowerCase().replace(/[.#$\/\[\]]/g,"_");
        const wcSC      = po.wcStandingsCache || {};

        if (!wcGroups.length) {
          body.innerHTML = `<div class="trn-empty"><div class="trn-empty-title">No groups configured yet.</div></div>`;
          return;
        }

        // Build teamName → {teamId, leagueId} — prefer wcStandingsCache, fallback to _currentT.standingsCache
        const teamInfoMap = {};
        const _buildTIM = (src) => Object.values(src||{}).forEach(lc => {
          const lid = String(lc.leagueId || lc.league_id || "");
          (lc.teams||[]).forEach(tm => { if (tm.teamName && lid) teamInfoMap[_sk(tm.teamName)] = { teamId: String(tm.teamId||""), leagueId: lid }; });
        });
        _buildTIM(wcSC);
        if (!Object.keys(teamInfoMap).length) _buildTIM(_currentT.standingsCache);

        const groupOpts = wcGroups.map((g, gi) =>
          `<option value="${gi}">${esc(g.name || ("Group "+(gi+1)))}</option>`
        ).join("");

        body.innerHTML = `
          <div class="trn-po-container" style="padding-top:var(--space-2)">
            <div style="display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3)">
              <label style="font-size:.82rem;font-weight:600;color:var(--color-text-dim)">View Group</label>
              <select id="pub-wc-group-sel" style="font-size:.82rem;padding:3px 8px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text)">${groupOpts}</select>
            </div>
            <div id="pub-wc-group-body"></div>
          </div>`;

        const _loadPubGroup = (gi) => {
          const g       = wcGroups[gi];
          const adv     = g.advanceCount ?? wcAdv;
          const members = g.members || [];
          const sched   = wcSched[String(gi)] || {};
          const _nflWk  = wi => startWk ? (startWk - wcRegWks + wi) : (wi + 1);

          const tableId = `pub-wc-tbl-${gi}`, muId = `pub-wc-mu-${gi}`;
          const weekOpts = Array.from({length: wcRegWks}, (_,wi) => `<option value="${wi}">Week ${wi+1}</option>`).join("");

          const el = document.getElementById("pub-wc-group-body");
          if (!el) return;
          el.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);align-items:start" class="trn-wc-group-layout">
              <div>
                <div id="pub-wc-loader-${gi}" style="font-size:.8rem;color:var(--color-text-dim);padding:4px 0">⏳ Loading…</div>
                <div class="trn-po-table-wrap">
                  <table class="trn-po-table" id="${tableId}" style="display:none">
                    <thead><tr><th>#</th><th>Team</th><th class="trn-po-th-num">W–L</th><th class="trn-po-th-num">PF</th><th>Status</th></tr></thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
              <div>
                <div style="font-size:.78rem;font-weight:700;margin-bottom:var(--space-2)">📅 Weekly Matchups</div>
                <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-2)">
                  <select id="pub-wc-wk-${gi}" style="font-size:.78rem;padding:2px 7px;border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text)">${weekOpts}</select>
                  <button class="btn-secondary btn-xs" id="pub-wc-ref-${gi}">↺ Refresh</button>
                </div>
                <div id="${muId}"></div>
              </div>
            </div>`;

          const scoreMap = {};
          const _fetchScores = async (lid, nflWk) => {
            const key = `${lid}|${nflWk}`;
            if (scoreMap[key]) return;
            try {
              const r = await fetch(`https://api.sleeper.app/v1/league/${lid}/matchups/${nflWk}`);
              if (!r.ok) return;
              const data = await r.json();
              (data||[]).forEach(m => { scoreMap[`${lid}|${nflWk}|${m.roster_id}`] = parseFloat(m.points)||0; });
            } catch(e) {}
          };
          const _score = (name, nflWk) => {
            const info = teamInfoMap[_sk(name)];
            if (!info) return null;
            const v = scoreMap[`${info.leagueId}|${nflWk}|${info.teamId}`];
            return v !== undefined ? v : null;
          };

          // Compute full standings from all weeks
          const rec = {};
          members.forEach(n => { rec[n] = { wins:0, losses:0, pf:0, pa:0, h2h:{}, h2hPF:{} }; });

          const _computeAndRender = async () => {
            const lids = [...new Set(members.map(n => teamInfoMap[_sk(n)]?.leagueId).filter(Boolean))];
            // Fetch all weeks
            for (let wi = 0; wi < wcRegWks; wi++) {
              if ((sched[String(wi)]||[]).length) {
                await Promise.allSettled(lids.map(lid => _fetchScores(lid, _nflWk(wi))));
              }
            }
            // Compute records
