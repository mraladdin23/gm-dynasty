    // ── Rules tab (public) ──────────────────────────────────
    function renderRulesTab(body) {
      const t   = _currentT;
      const rby = t.rulesByYear || {};
      const years = Object.keys(rby).map(Number).sort((a, b) => b - a);

      // Default to the globally selected year if available, else latest
      let selYear = (_selectedYear && rby[_selectedYear])
        ? String(_selectedYear)
        : (years.length ? String(years[0]) : null);

      function renderRulesContent(year) {
        const inner = document.getElementById("pub-rules-content");
        if (!inner) return;
        const rules = rby[year] || null;
        if (!rules?.content) {
          inner.innerHTML = `
            <div class="trn-empty" style="padding:var(--space-4) 0">
              <div class="trn-empty-icon">📋</div>
              <div class="trn-empty-title">No rules for ${year}</div>
              <div class="trn-empty-sub">The commissioner hasn't published rules for this year.</div>
            </div>`;
          return;
        }
        const htmlContent = rules.content
          .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/\n/g, "<br>")
          .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--color-accent)">$1</a>');
        inner.innerHTML = `
          <div style="display:flex;gap:var(--space-3);align-items:center;margin-bottom:var(--space-3);font-size:.78rem;color:var(--color-text-dim)">
            ${rules.version ? `<span>Version ${esc(String(rules.version))}</span>` : ""}
            ${rules.updatedAt ? `<span>${new Date(rules.updatedAt).toLocaleDateString()}</span>` : ""}
          </div>
          <div class="trn-info-bio trn-rules-full">${htmlContent}</div>`;
      }

      if (!selYear) {
        body.innerHTML = `
          <div class="trn-empty">
            <div class="trn-empty-icon">📋</div>
            <div class="trn-empty-title">No rules posted yet</div>
            <div class="trn-empty-sub">The commissioner hasn't published rules for this tournament.</div>
          </div>`;
        return;
      }

      const yearOptions = years.map(y =>
        `<option value="${y}" ${String(y) === selYear ? "selected" : ""}>${y}</option>`
      ).join("");

      body.innerHTML = `
        <div class="trn-section-card">
          <div class="trn-section-card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--space-2)">
            <span>Tournament Rules</span>
            ${years.length > 1 ? `
              <div style="display:flex;align-items:center;gap:var(--space-2)">
                <label style="font-size:.8rem;color:var(--color-text-dim)">Year:</label>
                <select id="pub-rules-year" style="font-size:.8rem;padding:2px 6px">${yearOptions}</select>
              </div>` : `<span style="font-size:.78rem;color:var(--color-text-dim)">${selYear}</span>`}
          </div>
          <div id="pub-rules-content"></div>
        </div>`;

      renderRulesContent(selYear);

      document.getElementById("pub-rules-year")?.addEventListener("change", function() {
        selYear = this.value;
        renderRulesContent(selYear);
      });
    }

    // ── Standings tab (read-only, reuses cached data) ───────
    let _stSort = { col: "overallRank", dir: "asc" };

    function renderStandingsTab(body) {
      const t       = _currentT;
      const cache   = t.standingsCache || {};
      const rankBy  = t.rankBy || "record";

      // All available years
      const allYears = [...new Set(Object.values(cache).map(lc => lc.year).filter(Boolean))].sort((a,b) => b-a);
      if (allYears.length && (_selectedYear === null || !allYears.includes(_selectedYear))) {
        _selectedYear = allYears[0];
      }

      // Filter by selected year
      const entries = Object.entries(cache).filter(([, lc]) =>
        !_selectedYear || lc.year === _selectedYear
      );

      if (!entries.length) {
        body.innerHTML = `<div class="trn-empty"><div class="trn-empty-title">No standings data${_selectedYear ? " for " + _selectedYear : ""}</div></div>`;
        return;
      }

      // Build participant lookup from publicTournaments data
      const pMap = t.participantMap || {};
      // Sanitize keys the same way as _writePublicSummary in tournament.js
      const _sk = (s) => String(s).trim().toLowerCase().replace(/[.#$\/\[\]]/g, "_");

      // Build rows
      let allRows = [];
      let lastSynced = 0;
      for (const [leagueId, lc] of entries) {
        const teams = [...(lc.teams || [])].sort((a, b) => {
          if (rankBy === "pf") return b.pf - a.pf;
          if (b.wins !== a.wins) return b.wins - a.wins;
          return b.pf - a.pf;
        });
        teams.forEach(team => {
          const key = _sk(team.teamName || "");
          const p   = pMap[key] || {};
          allRows.push({
            overallRank: 0,
            teamName:    p.displayName || team.teamName || "Unknown",
            rawTeamName: team.teamName || "Unknown",
            leagueName:  lc.leagueName || leagueId,
            conference:  lc.conference || "",
            division:    lc.division   || "",
            wins:        team.wins     || 0,
            losses:      team.losses   || 0,
            pf:          team.pf       || 0,
            pa:          team.pa       || 0,
            gender:      p.gender      || "",
            twitterHandle: pMap[_sk(team.teamName || "")]?.twitterHandle || ""
          });
        });
        if ((lc.lastSynced || 0) > lastSynced) lastSynced = lc.lastSynced;
      }

      // Overall rank
      allRows.sort((a, b) => rankBy === "pf"
        ? b.pf - a.pf
        : b.wins !== a.wins ? b.wins - a.wins : b.pf - a.pf
      );
      allRows.forEach((r, i) => r.overallRank = i + 1);

      const conferences = [...new Set(allRows.map(r => r.conference).filter(Boolean))].sort();
      const hasConf     = conferences.length > 0;
      const lastStr     = lastSynced ? new Date(lastSynced).toLocaleString() : "Unknown";

      sortAndRenderStandings(body, allRows, hasConf, lastStr, allYears);
    }

    function sortAndRenderStandings(body, allRows, hasConf, lastStr, allYears) {
      allYears = allYears || [];
      const mult = _stSort.dir === "asc" ? 1 : -1;
      const sorted = [...allRows].sort((a, b) => {
        const col = _stSort.col;
        if (col === "teamName" || col === "leagueName" || col === "conference")
          return mult * String(a[col]||"").localeCompare(String(b[col]||""));
        return mult * ((Number(a[col])||0) - (Number(b[col])||0));
      });

      const si = (col) => {
        if (_stSort.col !== col) return '<span style="margin-left:3px;font-size:.65rem;opacity:.4">⇅</span>';
        return '<span style="margin-left:3px;font-size:.65rem">' + (_stSort.dir === "asc" ? "↑" : "↓") + "</span>";
      };

      const thStyle = "cursor:pointer;user-select:none";

      body.innerHTML = `
        <div class="trn-standings-toolbar">
          <input type="text" id="pub-st-search" placeholder="Search team or league…" class="trn-st-search" />
        </div>
        <div class="trn-standings-meta">
          Last synced: ${esc(lastStr)} &middot; ${allRows.length} teams
        </div>
        <div class="standings-table-wrap">
          <table class="standings-table" id="pub-st-table">
            <thead><tr>
              <th class="standings-rank" data-col="overallRank" style="${thStyle}">#${si("overallRank")}</th>
              <th data-col="teamName" style="${thStyle}">Team${si("teamName")}</th>

              <th class="standings-win"  data-col="wins"   style="${thStyle}">W${si("wins")}</th>
              <th class="standings-loss" data-col="losses" style="${thStyle}">L${si("losses")}</th>
              <th class="standings-num"  data-col="pf"     style="${thStyle}">PF${si("pf")}</th>
            </tr></thead>
            <tbody id="pub-st-tbody">
              ${sorted.map(r => `
                <tr data-name="${esc(r.teamName.toLowerCase())}" data-raw="${esc((r.rawTeamName||r.teamName).toLowerCase())}" data-league="${esc(r.leagueName.toLowerCase())}" data-conf="${esc((r.conference||"").toLowerCase())}">
                  <td class="standings-rank">${r.overallRank}</td>
                  <td>
                    <span class="standings-team-cell">
                      <span class="st-av">${esc((r.teamName||"?").slice(0,2).toUpperCase())}</span>
                      <span class="trn-st-name-wrap">
                        <span class="trn-st-name">${esc(r.teamName)}${r.gender === "Male" ? ` <span class="trn-gender-m">M</span>` : r.gender === "Female" ? ` <span class="trn-gender-f">F</span>` : ""}${r.twitterHandle ? `<a href="https://x.com/${esc(r.twitterHandle.replace(/^@/,""))}" target="_blank" rel="noopener" class="trn-st-twitter">@${esc(r.twitterHandle.replace(/^@/,""))}</a>` : ""}</span>
                        ${hasConf && r.conference ? `<span class="trn-st-sub">${esc(r.conference)}</span>` : ""}
                        <span class="trn-st-sub trn-st-sub--league">${esc(r.leagueName)}</span>
                      </span>
                    </span>
                  </td>
                  <td class="standings-win">${r.wins}</td>
                  <td class="standings-loss">${r.losses}</td>
                  <td class="standings-num">${r.pf.toFixed(2)}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;

      // Search
      document.getElementById("pub-st-search")?.addEventListener("input", function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll("#pub-st-tbody tr").forEach(row => {
          const match = !q || row.dataset.name?.includes(q) || row.dataset.raw?.includes(q) || row.dataset.league?.includes(q) || row.dataset.conf?.includes(q);
          row.style.display = match ? "" : "none";
        });
      });

      // Sort headers
      document.querySelectorAll("[data-col]").forEach(th => {
        th.addEventListener("click", () => {
          const col = th.dataset.col;
          if (_stSort.col === col) _stSort.dir = _stSort.dir === "asc" ? "desc" : "asc";
          else { _stSort.col = col; _stSort.dir = "asc"; }
          sortAndRenderStandings(body, allRows, hasConf, lastStr, allYears);
        });
      });
    }

    // ── ADP tab ─────────────────────────────────────────────
    const POS_COLOR = { QB:"#b89ffe", RB:"#18e07a", WR:"#00d4ff", TE:"#ffc94d", K:"#9ca3af", DEF:"#9ca3af" };
    let _adpPage    = 1;
    let _adpPos     = "all";
    const ADP_PAGE_SIZE = 25;

    function _ensureAdpTabOption() {
      const sel = document.getElementById("pub-tab-select");
      if (!sel) return;
      if (sel.querySelector('option[value="adp"]')) return; // already there
      const opt = document.createElement("option");
      opt.value = "adp";
      opt.textContent = "📊 ADP";
      // Insert before Rules if it exists, otherwise append
      const rulesOpt = sel.querySelector('option[value="rules"]');
      if (rulesOpt) sel.insertBefore(opt, rulesOpt);
      else sel.appendChild(opt);
    }

    function _clearAdpRefresh() {
      if (_adpRefreshTimer) { clearInterval(_adpRefreshTimer); _adpRefreshTimer = null; }
    }

    // ── Public Playoffs Tab ──────────────────────────────
    // Reads from publicTournaments/{tid}/playoffs — written by admin "Publish Playoffs" button.
    async function renderPlayoffsTab(body) {
      // Always re-fetch playoffs from Firebase so the public page reflects
      // the latest publish without requiring a full page reload.
      body.innerHTML = `<div class="trn-po-container" style="padding:var(--space-4) 0;color:var(--color-text-dim);font-size:.85rem">Loading playoffs…</div>`;
      try {
        // Fetch the year-keyed playoffs node for the selected year
        const year = _selectedYear || new Date().getFullYear();
        const snap = await tRef(_currentTid).child(`playoffs/${year}`).once("value");
        if (snap.exists()) {
          if (!_currentT.playoffs) _currentT.playoffs = {};
          _currentT.playoffs[year] = snap.val();
        } else {
          // Legacy fallback: try flat node
          const flatSnap = await tRef(_currentTid).child("playoffs").once("value");
          if (flatSnap.exists()) _currentT.playoffs = flatSnap.val();
        }
      } catch(e) { /* use cached value on error */ }

      const t   = _currentT;
      const year = _selectedYear || new Date().getFullYear();
      // Get year-keyed playoff data, falling back to flat legacy format
      const playoffs_ = t.playoffs || {};
      const po = (playoffs_[year] && playoffs_[year].mode)
        ? playoffs_[year]
        : (playoffs_.mode ? playoffs_ : {});

      if (!po.mode) {
        body.innerHTML = `<div class="trn-po-container"><div class="trn-po-empty">Playoff information has not been published yet for ${year}. Click 📢 Publish from the admin Playoffs tab.</div></div>`;
        return;
      }

      const mode       = po.mode || "total_points";
      const standings  = po.standings  || [];
      const rounds     = po.rounds     || [];
      const qualCount  = po.qualCount  || standings.filter(tm => tm.qualified).length;
      const byeCount   = po.byeCount   || 0;
      const leagueChamps = po.leagueChamps || [];
      const showChamps = po.recognizeLeagueChampions && leagueChamps.length > 0;

      const modeLabel = {total_points:"Total Points",points_rounds:"Points Rounds",h2h_bracket:"H2H Bracket",custom_rounds:"Custom Rounds"}[mode]||mode;
      const modeIcon  = {total_points:"📊",points_rounds:"📈",h2h_bracket:"🥊",custom_rounds:"⚙️"}[mode]||"🏆";
      const sw = po.startWeek, ew = po.endWeek;

      // Helper: prefer displayName over teamName everywhere
      const _name = (tm) => esc(tm.displayName || tm.teamName || "—");

      // ── Tabs ──────────────────────────────────────────────
      const tabs = [{ id:"standings", label:"📊 Standings" }];
      if (mode==="total_points")    tabs.push({id:"leaderboard", label:"🏆 Leaderboard"});
      else if (mode==="points_rounds") rounds.forEach((_,i) => {
        tabs.push({id:`round_${i}`, label: i===rounds.length-1 ? "🏆 Championship" : `Round ${i+1}`});
      });
      else if (mode==="h2h_bracket") tabs.push({id:"bracket", label:"🥊 Bracket"});
      else if (mode==="custom_rounds") rounds.forEach((_,i) => {
        tabs.push({id:`cround_${i}`, label: i===rounds.length-1 ? "🏆 Championship" : `Round ${i+1}`});
      });
      if (showChamps) tabs.push({id:"league_champs", label:"🏅 League Champs"});

      let _tab = tabs[0].id;

      const _tabBar = (active) => `
        <div class="trn-po-subtab-bar">
          ${tabs.map(tb=>`<button class="trn-po-subtab-btn ${tb.id===active?"trn-po-subtab-btn--active":""}" data-subtab="${tb.id}">${tb.label}</button>`).join("")}
        </div>
        <select class="trn-po-tab-select" id="pub-po-tab-select">
          ${tabs.map(tb=>`<option value="${tb.id}" ${tb.id===active?"selected":""}>${tb.label}</option>`).join("")}
        </select>`;

      // ── Standings view ────────────────────────────────────
      const _standingsView = () => {
        const elimCount = standings.length - standings.filter(tm=>tm.qualified).length;
        const note = mode==="total_points"
          ? `Champion = highest PF${ew?` through Week ${ew}`:""}.`
          : `${standings.filter(tm=>tm.qualified).length} qualified · ${elimCount} eliminated${byeCount?` · ${byeCount} bye${byeCount!==1?"s":""}`:""}.${sw?` Playoffs Wk ${sw}`:""}`;

        let lastQualIdx = -1;
        standings.forEach((tm,i) => { if (tm.qualified) lastQualIdx = i; });

        const rows = standings.map((tm, i) => {
          const isChamp = mode==="total_points" && i===0;
          const isBye   = tm.bye;
          const isQ     = tm.qualified;
          const rowCls  = isChamp ? "trn-po-row--champion"
            : isBye ? "trn-po-row--bye-seed"
            : isQ   ? "trn-po-row--qualified"
            : "trn-po-row--eliminated";
          const badge = isChamp
            ? `<span class="trn-po-badge trn-po-badge--champion">🏆 Champion</span>`
            : isBye ? `<span class="trn-po-badge trn-po-badge--bye">BYE</span>`
            : isQ   ? `<span class="trn-po-badge trn-po-badge--qualified">✓ Qualified</span>`
            : `<span class="trn-po-badge trn-po-badge--eliminated">Eliminated</span>`;
          const champBanner = isChamp ? `<tr class="trn-po-row--champion-banner"><td colspan="5">
            <div class="trn-po-champion-banner">
              <span class="trn-po-champion-trophy">🏆</span>
              <div class="trn-po-champion-info">
                <div class="trn-po-champion-name">${_name(tm)}</div>
                <div class="trn-po-champion-sub">${esc(tm.leagueName||"")} · ${(tm.pf||0).toFixed(2)} pts · ${tm.wins??0}–${tm.losses??0}</div>
              </div>
              <span class="trn-po-champion-label">🏆 Tournament Champion</span>
            </div>
          </td></tr>` : "";
          const cutRow = (i === lastQualIdx + 1 && lastQualIdx >= 0)
            ? `<tr class="trn-po-cut-row"><td colspan="5"><div class="trn-po-cut-divider">— Qualification Cut Line — ${standings.filter(tm=>tm.qualified).length} qualified · ${elimCount} eliminated —</div></td></tr>`
            : "";
          return `${champBanner}${cutRow}<tr class="${rowCls}">
            <td class="trn-po-rank">${isChamp?"🏆":i+1}</td>
            <td class="trn-po-team-name">
              <div>${_name(tm)}</div>
              <div class="trn-st-sub trn-st-sub--league">${esc(tm.leagueName||"—")}</div>
            </td>
            <td class="trn-po-num">${tm.wins??0}–${tm.losses??0}</td>
            <td class="trn-po-num trn-po-pf">${(tm.pf||0).toFixed(2)}</td>
            <td>${badge}</td>
          </tr>`;
        }).join("");
        return `<div class="trn-po-tp-note">${note}</div>
          <div class="trn-po-table-wrap"><table class="trn-po-table">
            <thead><tr><th>#</th><th>Team</th><th class="trn-po-th-num">W–L</th><th class="trn-po-th-num">PF</th><th>Status</th></tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`;
      };

      // ── Leaderboard (total_points) ─────────────────────────
      const _leaderboard = () => `
        <div class="trn-po-table-wrap"><table class="trn-po-table">
          <thead><tr><th>#</th><th>Team</th><th class="trn-po-th-num">W–L</th><th class="trn-po-th-num">PF</th></tr></thead>
          <tbody>${standings.slice(0,20).map((tm,i)=>`<tr class="${i===0?"trn-po-row--champion":""}">
            <td class="trn-po-rank">${i===0?"🏆":i+1}</td>
            <td class="trn-po-team-name">
              <div>${_name(tm)}</div>
              <div class="trn-st-sub trn-st-sub--league">${esc(tm.leagueName||"")}</div>
            </td>
            <td class="trn-po-num">${tm.wins??0}–${tm.losses??0}</td>
            <td class="trn-po-num trn-po-pf">${(tm.pf||0).toFixed(2)}</td>
          </tr>`).join("")}</tbody>
        </table></div>
        ${standings.length>20?`<div class="trn-po-more">+ ${standings.length-20} more teams</div>`:""}`;

      // ── Round view (points_rounds / custom_rounds) ─────────
      // computedRounds: pre-computed at publish time with actual scores and blend values
      const computedRounds = po.computedRounds || [];

      // Fallback: derive from weeklyScores if computedRounds not present (legacy snapshots)
      const weeklyScores = po.weeklyScores || {};
      const _weekPts = (tm, week) => {
        if (!week || !tm.leagueId || !tm.teamId) return null;
        return weeklyScores[tm.leagueId]?.[String(week)]?.[String(tm.teamId)] ?? null;
      };
      const regSeasonWeeks = sw ? sw - 1 : null;

      const _roundView = (roundIdx, isCustom) => {
        const round = rounds[roundIdx];
        if (!round) return `<div class="trn-po-empty">Round data not available.</div>`;
        const isFinal  = roundIdx === rounds.length-1;
        const weekNum  = sw ? sw+roundIdx : null;

        // ── Fast path: use pre-computed results from publish snapshot ────
        const computed = computedRounds[roundIdx];
        if (computed && computed.results?.length) {
          const { blendEnabled, blendWeight, blendMode, poolByes, advCount, results } = computed;
          const histLabel = roundIdx===0 ? "reg avg" : `avg (reg + ${roundIdx} playoff wk${roundIdx!==1?"s":""})`;
          const blendNote = !blendEnabled ? "Score = this week's points"
            : blendMode==="weighted"
              ? `Score = week × ${100-blendWeight}% + ${histLabel} × ${blendWeight}%`
              : `Score = week pts + ${histLabel} × ${blendWeight}%`;
          const competitors = results.length - poolByes;
          const summary = poolByes > 0
            ? `${results.length} total · ${poolByes} byes · ${competitors} competing · ${advCount} advance · ${competitors-advCount} eliminated`
            : `${results.length} competing · ${advCount} advance · ${results.length-advCount} eliminated`;
          const tableId_  = `pub-round-table-${roundIdx}`;
          const byeBarId_ = `pub-round-bye-bar-${roundIdx}`;
          const headerCols_ = blendEnabled
            ? `<th class="trn-po-th-num trn-po-col-wk">Wk Score</th><th class="trn-po-th-num trn-po-col-avg">Avg/Wk</th><th class="trn-po-th-num trn-po-col-blend">Blend</th>`
            : `<th class="trn-po-th-num">Wk Score</th>`;
          const colSpan_ = blendEnabled ? 6 : 4;
          const tableClass_ = blendEnabled ? "trn-po-table trn-po-table--blend" : "trn-po-table";
          const rows_ = results.map((tm, i) => {
            const isByeTeam = tm.isBye;
            const compIdx   = i - poolByes;
            const rowCls    = tm.isChamp ? "trn-po-row--champion"
              : isByeTeam ? "trn-po-row--bye-seed"
              : tm.advances && !isByeTeam ? "trn-po-row--advance" : "trn-po-row--cut";
            const badge = tm.isChamp
              ? `<span class="trn-po-badge trn-po-badge--champion">🏆 Champion</span>`
              : isByeTeam ? `<span class="trn-po-badge trn-po-badge--bye">BYE</span>`
              : tm.advances ? `<span class="trn-po-badge trn-po-badge--advance">↑ Advances</span>`
              : `<span class="trn-po-badge trn-po-badge--eliminated">Eliminated</span>`;
            const cutAfter = !isFinal && !isByeTeam && compIdx === advCount-1;
            const scoreCell = isByeTeam
              ? (blendEnabled ? `<td class="trn-po-num dim trn-po-col-wk">—</td><td class="trn-po-num dim trn-po-col-avg">—</td><td class="trn-po-num dim trn-po-col-blend">—</td>` : `<td class="trn-po-num dim">—</td>`)
              : blendEnabled
                ? `<td class="trn-po-num trn-po-pf trn-po-col-wk">${tm.wkScore != null ? tm.wkScore.toFixed(2) : "—"}</td>
                   <td class="trn-po-num trn-po-col-avg">${tm.regAvgPW.toFixed(2)}</td>
                   <td class="trn-po-num trn-po-pf trn-po-col-blend">${tm.bScore != null ? tm.bScore.toFixed(2) : "—"}</td>`
                : `<td class="trn-po-num trn-po-pf">${tm.wkScore != null ? tm.wkScore.toFixed(2) : "—"}</td>`;
            return `<tr class="${rowCls}${isByeTeam?" pub-bye-row":""}" ${isByeTeam?'style="display:none"':""}>
              <td class="trn-po-rank">${i+1}</td>
              <td class="trn-po-team-name">
                <div>${esc(tm.displayName||tm.teamName||"—")}</div>
                <div class="trn-st-sub trn-st-sub--league">${esc(tm.leagueName||"")}</div>
              </td>
              ${scoreCell}
              <td>${badge}</td>
            </tr>${cutAfter?`<tr class="trn-po-cut-row"><td colspan="${colSpan_}"><div class="trn-po-cut-divider">— Cut Line — ${advCount} advance · ${competitors-advCount} eliminated</div></td></tr>`:""}`;
          }).join("");
          setTimeout(() => {
            const byeBar_ = document.getElementById(byeBarId_);
            const table_  = document.getElementById(tableId_);
            if (!byeBar_ || !table_ || poolByes === 0) return;
            let vis = false;
            const upd = () => {
              byeBar_.innerHTML = `<button class="trn-po-bye-toggle">${vis?"▼ Hide":"▶ Show"} ${poolByes} bye${poolByes!==1?"s":""} (auto-advance)</button>`;
              table_.querySelectorAll(".pub-bye-row").forEach(tr => { tr.style.display = vis ? "" : "none"; });
              byeBar_.querySelector("button").onclick = () => { vis = !vis; upd(); };
            };
            upd();
          }, 0);
          return `
            <div class="trn-po-round-card ${isFinal?"trn-po-round-card--final":""}">
              <div class="trn-po-round-header">
                <span>${isFinal?"🏆 Championship":`Round ${roundIdx+1}`}</span>
                ${weekNum?`<span class="trn-po-week-tag">Week ${weekNum}</span>`:""}
                <span class="trn-po-round-meta">${summary}</span>
              </div>
              <div class="trn-po-round-blend-note">${blendNote}</div>
            </div>
            <div class="trn-po-table-wrap" style="margin-top:var(--space-2)">
              <div id="${byeBarId_}"></div>
              <table class="${tableClass_}" id="${tableId_}">
                <thead><tr><th>#</th><th>Team</th>${headerCols_}<th>Status</th></tr></thead>
                <tbody>${rows_}</tbody>
              </table>
            </div>`;
        }
        // ── Fallback: derive from weeklyScores / PF (legacy snapshots) ──

        const blend        = round.blend;
        const blendEnabled = !!(blend?.enabled);
        const blendWeight  = blend?.weight ?? 30;
        const blendMode    = blend?.mode || "weighted";
        const histLabel = roundIdx===0 ? "reg avg" : `avg (reg + ${roundIdx} playoff wk${roundIdx!==1?"s":""})`;
        const blendNote = !blendEnabled ? "Score = this week's points"
          : blendMode==="weighted"
            ? `Score = week × ${100-blendWeight}% + ${histLabel} × ${blendWeight}%`
            : `Score = week pts + ${histLabel} × ${blendWeight}%`;

        // Build pool: bye teams first, then rest, simulate advancement using stored weekly scores
        const byeTeams_  = standings.filter(tm => tm.bye);
        const compTeams_ = standings.filter(tm => tm.qualified && !tm.bye);
        let pool = [...byeTeams_, ...compTeams_];

        for (let ri = 0; ri < roundIdx; ri++) {
          const r = rounds[ri];
          const rWeekNum  = sw ? sw + ri : null;
          const isByeRi   = ri === 0 && byeCount > 0;
          const rPoolByes = isByeRi ? byeCount : 0;
          const compSection = pool.slice(rPoolByes);
          const competitors = compSection.length;
          const adv = isCustom ? (r.groups||0)*(r.advPerGroup||0)
            : r.advanceMethod==="pct" ? Math.round(competitors*(r.advancePct||50)/100)
            : (r.advanceCount||0);
          // Sort comp section by week score if available, else by PF
          const sorted = [...compSection].sort((a, b) => {
            const sa = _weekPts(a, rWeekNum) ?? -1;
            const sb = _weekPts(b, rWeekNum) ?? -1;
            if (sb !== sa) return sb - sa;
            return (b.pf||0) - (a.pf||0);
          });
          pool = [...pool.slice(0, rPoolByes), ...sorted.slice(0, adv)];
        }

        const isByeRound  = roundIdx === 0 && byeCount > 0;
        const poolByes    = isByeRound ? byeCount : 0;
        const competitors = pool.length - poolByes;
        const advCount = isFinal ? 1
          : isCustom ? (round.groups||0)*(round.advPerGroup||0)
          : round.advanceMethod==="pct" ? Math.round(competitors*(round.advancePct||50)/100)
          : (round.advanceCount||0);

        // Annotate with this week's score and sort competing section
        const regWeeks = regSeasonWeeks || 1;
        const poolScored = pool.map(tm => {
          const wkScore  = _weekPts(tm, weekNum);
          const regAvgPW = (tm.pf||0) / regWeeks;
          const bScore   = !blendEnabled || wkScore == null ? null
            : blendMode==="weighted"
              ? wkScore * (1 - blendWeight/100) + regAvgPW * (blendWeight/100)
              : wkScore + regAvgPW * (blendWeight/100);
          return { ...tm, wkScore, regAvgPW, bScore };
        });
        const byeSect = poolScored.slice(0, poolByes);
        const compSect = poolScored.slice(poolByes).sort((a, b) => {
          const sa = blendEnabled ? (b.bScore ?? b.wkScore ?? b.pf) : (b.wkScore ?? b.pf);
          const sb = blendEnabled ? (a.bScore ?? a.wkScore ?? a.pf) : (a.wkScore ?? a.pf);
          return sa - sb;
        });
        const sortedPool = [...byeSect, ...compSect];

        const summary = isByeRound
          ? `${pool.length} total · ${poolByes} byes · ${competitors} competing · ${advCount} advance · ${competitors-advCount} eliminated`
          : `${pool.length} competing · ${advCount} advance · ${pool.length-(poolByes+advCount)} eliminated`;

        const tableId  = `pub-round-table-${roundIdx}`;
        const byeBarId = `pub-round-bye-bar-${roundIdx}`;
        const headerCols = blendEnabled
          ? `<th class="trn-po-th-num trn-po-col-wk">Wk Score</th><th class="trn-po-th-num trn-po-col-avg">Avg/Wk</th><th class="trn-po-th-num trn-po-col-blend">Blend</th>`
          : `<th class="trn-po-th-num">Wk Score</th>`;
        const colSpan = blendEnabled ? 6 : 4;
        const tableClass = blendEnabled ? "trn-po-table trn-po-table--blend" : "trn-po-table";

        const rows = sortedPool.map((tm, i) => {
          const isByeTeam = isByeRound && i < poolByes;
          const compIdx   = i - poolByes;
          const isCompAdv = !isByeTeam && compIdx < advCount;
          const isChamp   = isFinal && i === poolByes;
          const rowCls    = isChamp ? "trn-po-row--champion"
            : isByeTeam ? "trn-po-row--bye-seed"
            : isCompAdv ? "trn-po-row--advance" : "trn-po-row--cut";
          const badge = isChamp
            ? `<span class="trn-po-badge trn-po-badge--champion">🏆 Champion</span>`
            : isByeTeam ? `<span class="trn-po-badge trn-po-badge--bye">BYE</span>`
            : isCompAdv ? `<span class="trn-po-badge trn-po-badge--advance">↑ Advances</span>`
            : `<span class="trn-po-badge trn-po-badge--eliminated">Eliminated</span>`;
          const cutAfter = !isFinal && !isByeTeam && compIdx === advCount-1;
          const scoreCell = isByeTeam
            ? (blendEnabled ? `<td class="trn-po-num dim trn-po-col-wk">—</td><td class="trn-po-num dim trn-po-col-avg">—</td><td class="trn-po-num dim trn-po-col-blend">—</td>` : `<td class="trn-po-num dim">—</td>`)
            : blendEnabled
              ? `<td class="trn-po-num trn-po-pf trn-po-col-wk">${tm.wkScore != null ? tm.wkScore.toFixed(2) : "—"}</td>
                 <td class="trn-po-num trn-po-col-avg">${tm.regAvgPW.toFixed(2)}</td>
                 <td class="trn-po-num trn-po-pf trn-po-col-blend">${tm.bScore != null ? tm.bScore.toFixed(2) : "—"}</td>`
              : `<td class="trn-po-num trn-po-pf">${tm.wkScore != null ? tm.wkScore.toFixed(2) : "—"}</td>`;
          const byeClass = isByeTeam ? " pub-bye-row" : "";
          return `<tr class="${rowCls}${byeClass}" ${isByeTeam ? 'style="display:none"' : ""}>
            <td class="trn-po-rank">${i+1}</td>
            <td class="trn-po-team-name">
              <div>${_name(tm)}</div>
              <div class="trn-st-sub trn-st-sub--league">${esc(tm.leagueName||"")}</div>
            </td>
            ${scoreCell}
            <td>${badge}</td>
          </tr>${cutAfter ? `<tr class="trn-po-cut-row"><td colspan="${colSpan}"><div class="trn-po-cut-divider">— Cut Line — ${advCount} advance · ${competitors-advCount} eliminated</div></td></tr>` : ""}`;
        }).join("");

        // After DOM insertion, wire bye toggle via setTimeout
        setTimeout(() => {
          const byeBar = document.getElementById(byeBarId);
          const table  = document.getElementById(tableId);
          if (!byeBar || !table || poolByes === 0) return;
          let byesVisible = false;
          const update = () => {
            byeBar.innerHTML = `<button class="trn-po-bye-toggle">${byesVisible?"▼ Hide":"▶ Show"} ${poolByes} bye${poolByes!==1?"s":""} (auto-advance)</button>`;
            table.querySelectorAll(".pub-bye-row").forEach(tr => { tr.style.display = byesVisible ? "" : "none"; });
            byeBar.querySelector("button").onclick = () => { byesVisible = !byesVisible; update(); };
          };
          update();
        }, 0);

        return `
          <div class="trn-po-round-card ${isFinal?"trn-po-round-card--final":""}">
            <div class="trn-po-round-header">
              <span>${isFinal?"🏆 Championship":`Round ${roundIdx+1}`}</span>
              ${weekNum?`<span class="trn-po-week-tag">Week ${weekNum}</span>`:""}
              <span class="trn-po-round-meta">${summary}</span>
            </div>
            <div class="trn-po-round-blend-note">${blendNote}</div>
          </div>
          <div class="trn-po-table-wrap" style="margin-top:var(--space-2)">
            <div id="${byeBarId}"></div>
            <table class="${tableClass}" id="${tableId}">
              <thead><tr><th>#</th><th>Team</th>${headerCols}<th>Status</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      };

      // ── Bracket view ──────────────────────────────────────
      const _bracketView = () => {
        const bracketSize = po.bracketSize||8;
        const seeds = standings.slice(0,bracketSize);
        const numRounds = Math.log2(bracketSize);
        const r1Byes = seeds.slice(0,byeCount);
        const r1Players = seeds.slice(byeCount);
        const r1Matchups=[];
        for(let i=0;i<Math.floor(r1Players.length/2);i++)
          r1Matchups.push({a:r1Players[i],b:r1Players[r1Players.length-1-i]});
        const rName=(ri,tot)=>ri===tot-1?"🏆 Championship":ri===tot-2?"Semifinals":ri===tot-3?"Quarterfinals":`Round ${ri+1}`;
        return `<div class="trn-po-bracket-wrap"><div class="trn-po-bracket">
          <div class="trn-po-bracket-round">
            <div class="trn-po-bracket-round-title">${rName(0,numRounds)}</div>
            ${r1Byes.map(tm=>`<div class="trn-po-matchup trn-po-matchup--bye"><div class="trn-po-matchup-row">
              <span class="trn-po-matchup-seed">#${seeds.indexOf(tm)+1}</span>
              <span class="trn-po-matchup-team trn-po-matchup-team--bye">${_name(tm)}</span>
              <span class="trn-po-badge trn-po-badge--bye" style="margin-left:auto">BYE</span>
            </div></div>`).join("")}
            ${r1Matchups.map(m=>`<div class="trn-po-matchup">
              <div class="trn-po-matchup-row"><span class="trn-po-matchup-seed">#${seeds.indexOf(m.a)+1}</span><span class="trn-po-matchup-team">${_name(m.a)}</span><span class="trn-po-matchup-pf">${(m.a?.pf||0).toFixed(1)}</span></div>
              <div class="trn-po-matchup-vs">vs</div>
              <div class="trn-po-matchup-row"><span class="trn-po-matchup-seed">#${seeds.indexOf(m.b)+1}</span><span class="trn-po-matchup-team">${_name(m.b)}</span><span class="trn-po-matchup-pf">${(m.b?.pf||0).toFixed(1)}</span></div>
            </div>`).join("")}
          </div>
          ${Array.from({length:numRounds-1},(_,ri)=>`<div class="trn-po-bracket-round">
            <div class="trn-po-bracket-round-title">${rName(ri+1,numRounds)}</div>
            ${Array.from({length:Math.pow(2,numRounds-ri-2)},()=>`<div class="trn-po-matchup trn-po-matchup--tbd">
              <div class="trn-po-matchup-row"><span class="trn-po-matchup-team trn-po-tbd">TBD</span></div>
              <div class="trn-po-matchup-vs">vs</div>
              <div class="trn-po-matchup-row"><span class="trn-po-matchup-team trn-po-tbd">TBD</span></div>
            </div>`).join("")}
          </div>`).join("")}
        </div></div>
        <div class="trn-po-seed-list"><div class="trn-po-section-title">Seedings</div>
          ${seeds.map((tm,i)=>`<div class="trn-po-seed-row ${i<byeCount?"trn-po-seed-row--bye":""}">
            <span class="trn-po-seed-num">#${i+1}</span>
            <span class="trn-po-seed-name">${_name(tm)}</span>
            <span class="trn-po-seed-league">${esc(tm.leagueName||"")}</span>
            <span class="trn-po-seed-record">${tm.wins??0}–${tm.losses??0}</span>
            <span class="trn-po-seed-pf">${(tm.pf||0).toFixed(1)} pts</span>
            ${i<byeCount?`<span class="trn-po-badge trn-po-badge--bye">BYE</span>`:""}
          </div>`).join("")}
        </div>`;
      };

      // ── League Champs view ────────────────────────────────
      const _leagueChampsView = () => {
        if (!leagueChamps.length)
          return `<div class="trn-po-empty">No league champion data published yet.</div>`;
        const playoffChamps = leagueChamps.filter(e=>e.isPlayoff);
        const regLeaders    = leagueChamps.filter(e=>!e.isPlayoff);
        const _card = (e) => `
          <div class="trn-po-champ-card">
            <div class="trn-po-champ-info">
              <div class="trn-po-champ-name">${esc(e.displayName||e.teamName||"Unknown")}</div>
              <div class="trn-po-champ-league">${esc(e.leagueName||"")}</div>
            </div>
            <div class="trn-po-champ-record">${e.wins??0}–${e.losses??0} · ${(e.pf||0).toFixed(1)} pts</div>
          </div>`;
        const _section = (title, icon, items) => items.length===0 ? "" : `
          <div class="trn-po-champ-section">
            <div class="trn-po-champ-section-title">${icon} ${title}</div>
            <div class="trn-po-champ-grid">${items.map(_card).join("")}</div>
          </div>`;
        return _section("League Champions (Playoff Winners)", "🏆", playoffChamps)
             + _section("Regular Season Leaders", "📊", regLeaders);
      };

      // ── Render content by tab ─────────────────────────────
      const _renderContent = (tabId) => {
        if (tabId==="standings")    return _standingsView();
        if (tabId==="leaderboard")  return _leaderboard();
        if (tabId==="bracket")      return _bracketView();
        if (tabId==="league_champs") return _leagueChampsView();
        if (tabId.startsWith("round_"))  return _roundView(parseInt(tabId.split("_")[1]), false);
        if (tabId.startsWith("cround_")) return _roundView(parseInt(tabId.split("_")[1]), true);
        return `<div class="trn-po-empty">Tab not found.</div>`;
      };

      const publishedDate = po.publishedAt
        ? `<span style="font-size:.72rem;color:var(--color-text-dim)">Updated ${new Date(po.publishedAt).toLocaleDateString()}</span>` : "";

      body.innerHTML = `<div class="trn-po-container">
        <div class="trn-po-header">
          <div class="trn-po-title">${modeIcon} Playoffs <span class="trn-po-year-badge">${po.year||""}</span></div>
          <div class="trn-po-mode-chip">${modeLabel}</div>
          ${publishedDate}
        </div>
        ${_tabBar(_tab)}
        <div id="pub-po-content">${_renderContent(_tab)}</div>
      </div>`;

      body.querySelectorAll(".trn-po-subtab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          _tab = btn.dataset.subtab;
          body.querySelectorAll(".trn-po-subtab-btn").forEach(b =>
            b.classList.toggle("trn-po-subtab-btn--active", b.dataset.subtab===_tab));
          const sel = document.getElementById("pub-po-tab-select");
          if (sel) sel.value = _tab;
          document.getElementById("pub-po-content").innerHTML = _renderContent(_tab);
        });
      });
      document.getElementById("pub-po-tab-select")?.addEventListener("change", function() {
        _tab = this.value;
        body.querySelectorAll(".trn-po-subtab-btn").forEach(b =>
          b.classList.toggle("trn-po-subtab-btn--active", b.dataset.subtab===_tab));
        document.getElementById("pub-po-content").innerHTML = _renderContent(_tab);
      });
    }

    async function submitPublicRegistration(fields, custom, form) {
      const errEl = document.getElementById("pub-reg-error");
      const btn   = document.getElementById("pub-reg-submit");

      // Helper: find the right success container — overlay path or tab path
      const _successContainer = () =>
        document.getElementById("pub-register-page-body") ||
        document.getElementById("pub-tab-body");

      const _showError = (msg) => {
        if (errEl) { errEl.textContent = msg; errEl.classList.remove("hidden"); }
        if (btn)   { btn.disabled = false; btn.textContent = "Submit Registration"; }
      };

      const entry = {
        status:      "pending",
        submittedAt: Date.now(),
        source:      "public_form",
        dlrUsername: null,
        dlrLinked:   false
      };

      // ── Collect and validate fields ────────────────────
      for (const f of fields) {
        const val = document.getElementById("pub-reg-" + f)?.value.trim();
        if (!val && ["displayName", "email"].includes(f)) {
          return _showError((f === "displayName" ? "Display Name" : "Email Address") + " is required.");
        }
        entry[f] = val || null;
      }
      for (let i = 0; i < custom.length; i++) {
        const q   = custom[i];
        const val = document.getElementById("pub-reg-custom-" + i)?.value.trim();
        if (q.required && !val) return _showError('"' + q.question + '" is required.');
        if (val) entry["custom_" + i] = val;
      }

      // ── Pre-flight: check if already approved ─────────
      // participantMap is in publicTournaments and already loaded in _currentT
      const _norm = (s) => String(s || "").trim().toLowerCase().replace(/[.#$\/\[\]]/g, "_");
      const pMap  = _currentT.participantMap || {};
      const emailKey = _norm(entry.email       || "");
      const nameKey  = _norm(entry.displayName || "");
      if ((emailKey && pMap[emailKey]) || (nameKey && pMap[nameKey])) {
        return _showError("✅ You're already an approved participant in this tournament! Check your email for your league invite.");
      }

      // ── Pre-flight: check localStorage guard (client-side duplicate prevention) ──
      // This catches the case where the Firebase write succeeded but the success screen
      // didn't show (e.g. network hiccup on the count update).
      const _storageKey = "reg_submitted_" + _currentTid + "_" + _norm(entry.email || entry.displayName || "");
      try {
        if (localStorage.getItem(_storageKey)) {
          return _showError("📬 It looks like you already submitted a registration for this tournament. If you haven't heard back, please contact the tournament admin.");
        }
      } catch(e) { /* localStorage may be blocked — non-fatal */ }

      // ── Disable button and clear any previous error ────
      if (btn) { btn.disabled = true; btn.textContent = "Submitting…"; }
      if (errEl) errEl.classList.add("hidden");

      try {
        const rid = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        await _pubDb.ref("gmd/tournaments/" + _currentTid + "/registrations/" + rid).set(entry);

        // Mark submitted in localStorage so repeat clicks show a friendly message
        try { localStorage.setItem(_storageKey, "1"); } catch(e) {}

        // Update public registrationCount (non-fatal if this fails)
        try {
          const newCount = (_currentT.registrationCount || 0) + 1;
          await _pubDb.ref("gmd/publicTournaments/" + _currentTid + "/registrationCount").set(newCount);
          _currentT.registrationCount = newCount;
        } catch(e) { /* count update failure should not block success screen */ }

        // Show success in whichever container is active (overlay or tab)
        const container = _successContainer();
        if (container) {
          container.innerHTML = `
            <div class="trn-success">
              <div class="trn-success-icon">✅</div>
              <h3>Registration Submitted!</h3>
              <p>Your registration for <strong>${esc(_currentT.name || "this tournament")}</strong>
              is pending review. You'll receive a league invite link once approved.</p>
              <p style="font-size:.85rem;color:var(--color-text-dim);margin-top:var(--space-3)">
                Want to track all your leagues in one place?
                <a href="../?register=1" style="color:var(--color-primary)">Sign up for Dynasty Locker Room →</a>
              </p>
            </div>`;
        }
      } catch(err) {
        // Friendly messages for known Firebase error codes
        const code = (err.code || err.message || "").toLowerCase();
        let friendlyMsg;
        if (code.includes("permission_denied") || code.includes("permission denied")) {
          // Check localStorage — if we stored a key, the first write succeeded and this
          // is a duplicate attempt caught by Firebase rules
          let alreadySubmitted = false;
          try { alreadySubmitted = !!localStorage.getItem(_storageKey); } catch(e) {}
          if (alreadySubmitted) {
            friendlyMsg = "📬 Your registration was already submitted! The admin will review it shortly.";
          } else {
            // Check participantMap again — might have been approved since page load
            friendlyMsg = "⚠️ Registration could not be submitted. You may already be registered or approved for this tournament. Please contact the tournament admin if you think this is an error.";
          }
        } else if (code.includes("network") || code.includes("unavailable") || code.includes("timeout")) {
          friendlyMsg = "⚠️ Network error — please check your connection and try again.";
        } else {
          friendlyMsg = "Submission failed. Please try again or contact the tournament admin.";
        }
        _showError(friendlyMsg);
      }
    }

    function showError(msg) {
      const loading = document.getElementById("pub-loading");
      const content = document.getElementById("pub-content");
      loading.style.display = "none";
      content.style.display = "";
      content.innerHTML = `<div style="text-align:center;padding:60px 16px;color:var(--color-text-dim)">${esc(msg)}</div>`;
    }

    // ── Handle browser back/forward ─────────────────────────
    window.addEventListener("popstate", () => {
      const p = new URLSearchParams(window.location.search);
      const tid = p.get("t");
      if (tid) loadTournament(tid);
      else loadDirectory();
    });

    // ── Boot ────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
